<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sanskrit Visual Builder v3.2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0D1117;--bg2:#161B22;--bg3:#1C2128;--bg4:#21262D;--border:#30363D;--border2:#21262D;--text:#E6EDF3;--text2:#8B949E;--text3:#484F58;--accent:#58A6FF;--accent2:#1F6FEB;--green:#3FB950;--red:#F85149;--orange:#D29922;--purple:#BC8CFF;--cyan:#79C0FF;--teal:#39D353;--panel:rgba(22,27,34,.97);--shadow:0 8px 32px rgba(0,0,0,.7);--r:8px;--mono:'Cascadia Code','Fira Code','Consolas',monospace}
.theme-midnight{--bg:#000B18;--bg2:#00101F;--bg3:#001528;--border:#0D2137}
.theme-purple{--bg:#0E0617;--bg2:#150920;--bg3:#1C0D2D;--border:#3D1A6B;--accent:#BC8CFF;--accent2:#7C3AED}
.theme-forest{--bg:#0D1A0D;--bg2:#111F11;--bg3:#162416;--border:#1E3B1E;--accent:#3FB950;--accent2:#15803D}
.theme-ocean{--bg:#0A1628;--bg2:#0F1F3A;--bg3:#142848;--border:#1E3A5F;--accent:#38BDF8;--accent2:#0369A1}
.theme-light{--bg:#F6F8FA;--bg2:#FFF;--bg3:#F0F2F5;--bg4:#E8EBF0;--border:#D0D7DE;--border2:#E0E5EB;--text:#1F2328;--text2:#57606A;--text3:#99A1A9;--panel:rgba(255,255,255,.98)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .15s}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#app{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden;position:relative}

/* TOOLBAR */
#toolbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:3px;padding:0 10px;flex-shrink:0;z-index:200;user-select:none}
.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px;margin-right:6px}
.tb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0}
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;background:transparent;color:var(--text2);font-size:12px;font-weight:500;white-space:nowrap}
.tb-btn:hover{background:var(--bg3);color:var(--text)}.tb-btn.primary{background:var(--accent2);color:#fff}.tb-btn.primary:hover{filter:brightness(1.15)}
.tb-btn.danger{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}.tb-btn:disabled{opacity:.35;cursor:not-allowed}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
#status-dot.running{background:var(--orange);box-shadow:0 0 6px var(--orange);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* METRICS */
#metrics-bar{height:22px;background:var(--bg);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;padding:0 12px;flex-shrink:0;font-size:10px;color:var(--text3);font-family:var(--mono)}
.mi{display:flex;align-items:center;gap:5px}
.mb{width:44px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px;transition:width 1.2s,background .5s;background:linear-gradient(90deg,var(--accent),var(--cyan))}
.mbf.hot{background:var(--red)}.mbf.warm{background:var(--orange)}

/* WORKSPACE */
#workspace{flex:1;position:relative;overflow:hidden;min-height:0}

/* CANVAS */
#canvas-area{position:absolute;inset:0;overflow:hidden;background-image:radial-gradient(circle,var(--border2) 1px,transparent 1px);background-size:24px 24px}
#cb{position:absolute;top:0;left:0;width:5000px;height:4000px;transform-origin:0 0}
#wsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}.wire-hit{pointer-events:stroke !important;cursor:pointer}
#canvas-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:.28}
#canvas-hint .hi{font-size:52px;margin-bottom:10px}
#canvas-hint h2{font-size:17px;font-weight:600;margin-bottom:6px}
#canvas-hint p{font-size:12px;color:var(--text2);line-height:1.7}
.czoom{position:absolute;bottom:14px;right:14px;display:flex;gap:4px;z-index:20;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:3px;backdrop-filter:blur(10px)}
.czoom button{width:26px;height:26px;background:transparent;border-radius:5px;color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center}
.czoom button:hover{background:var(--bg3);color:var(--text)}

/* FLOATING PANELS */
.panel{position:absolute;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:180px;min-height:60px;backdrop-filter:blur(20px);z-index:100;overflow:hidden}
.ph{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:grab;user-select:none;flex-shrink:0;min-height:32px}
.ph:active{cursor:grabbing}.pi{font-size:13px;flex-shrink:0}.pt{font-size:11px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbtns{display:flex;gap:1px;margin-left:auto;flex-shrink:0}
.pb{width:20px;height:20px;border-radius:4px;background:transparent;color:var(--text3);font-size:10px;display:flex;align-items:center;justify-content:center}
.pb:hover{background:var(--bg3);color:var(--text)}
.pbody{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel.minimized .pbody{display:none}.panel.minimized{min-height:0!important}
.rh{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:se-resize;z-index:5}
.rh::after{content:'';position:absolute;bottom:3px;right:3px;width:7px;height:7px;border-right:2px solid var(--text3);border-bottom:2px solid var(--text3)}

/* PALETTE */
#pal-sw{padding:7px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:4px}
#pal-s{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px}
#pal-s:focus{border-color:var(--accent)}
#pal-list{flex:1;overflow-y:auto;padding:2px 0}
.pch{padding:5px 10px 4px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:3px solid transparent;user-select:none}
.pch:hover{color:var(--text2)}.pch .arr{font-size:9px;transition:transform .2s}.pch.coll .arr{transform:rotate(-90deg)}
.pcb{}.pitem{padding:5px 10px 5px 18px;display:flex;align-items:center;gap:7px;cursor:grab;border-left:2px solid transparent;font-size:11px;color:var(--text2);transition:all .1s}
.pitem:hover{background:var(--bg3);color:var(--text);border-left-color:var(--accent)}.pitem:active{cursor:grabbing}
.pii{font-size:12px;width:18px;text-align:center;flex-shrink:0}.pil{flex:1}
.pno{padding:20px;text-align:center;color:var(--text3);font-size:12px}

/* BLOCKS */
.vb{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:200px;user-select:none;cursor:move}
.vb:hover{box-shadow:0 4px 20px rgba(0,0,0,.55)}.vb.sel{box-shadow:0 0 0 2px var(--accent),0 8px 24px rgba(88,166,255,.2)}
.vbh{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px 8px 0 0;border-bottom:1px solid rgba(0,0,0,.25)}
.vbicon{font-size:13px;flex-shrink:0}.vbtitle{font-size:11px;font-weight:600;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vbcat{font-size:9px;color:rgba(255,255,255,.5);flex-shrink:0;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vbb{padding:6px 9px}
.vbrow{display:flex;align-items:center;gap:5px;min-height:18px;font-size:10px}
.vblbl{color:var(--text3);min-width:44px;flex-shrink:0}.vbval{color:var(--text2);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vbports{display:flex;justify-content:space-between;padding:5px 6px 4px}
.pincol,.poutcol{display:flex;flex-direction:column;gap:7px}
.portrow{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text3)}
.portrow.out{flex-direction:row-reverse}
.dot{width:11px;height:11px;border-radius:50%;border:2px solid;cursor:crosshair;flex-shrink:0;transition:transform .1s,box-shadow .1s}
.dot:hover{transform:scale(1.5);box-shadow:0 0 7px currentColor}
.dot.quantum{background:#7C3AED;border-color:#A78BFA;color:#A78BFA}
.dot.dataset{background:#0891B2;border-color:#22D3EE;color:#22D3EE}
.dot.result{background:#059669;border-color:#34D399;color:#34D399}
.dot.number{background:#1D4ED8;border-color:#60A5FA;color:#60A5FA}
.dot.any{background:#374151;border-color:#6B7280;color:#6B7280}
.dot.model{background:#7C3AED;border-color:#A78BFA;color:#A78BFA}

/* Block flags */
.vbflags{display:flex;gap:3px;padding:4px 7px;border-top:1px solid rgba(0,0,0,.25);background:rgba(0,0,0,.15);flex-wrap:wrap}
.vbflag{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;border:1px solid transparent;user-select:none}
.vbflag:hover{background:var(--bg3);border-color:var(--border);color:var(--text2)}
.vbflag input[type=checkbox]{width:11px;height:11px;cursor:pointer;margin:0}
.vbflag.bypass-flag input{accent-color:var(--orange)}.vbflag.tc-flag input{accent-color:var(--green)}.vbflag.pio-flag input{accent-color:var(--cyan)}
.vb.bypassed{opacity:.45}.vb.bypassed .vbh{background:var(--text3)!important}

/* Block resize handle */
.vrh{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;z-index:20}
.vrh::after{content:'';position:absolute;bottom:2px;right:2px;width:7px;height:7px;border-right:2px solid var(--text3);border-bottom:2px solid var(--text3)}

/* PROPERTIES */
.pe{padding:20px;text-align:center;color:var(--text3)}
.pe .pei{font-size:28px;margin-bottom:8px}.pe .pet{font-size:12px}
.pe .peh{margin-top:12px;font-size:10px;color:var(--text3);font-family:var(--mono);line-height:2}
.psec{padding:10px 12px;border-bottom:1px solid var(--border2)}
.psect{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.pf{margin-bottom:9px}
.pl{display:block;font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500}
.pi2{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:11px}
.pi2:focus{border-color:var(--accent)}
.psel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:11px}
.pta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:11px;font-family:var(--mono);resize:vertical;min-height:55px}
.pta:focus,.psel:focus{border-color:var(--accent)}
.pd{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.4}
.pbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:8px;margin:2px}
.pquick{width:100%;padding:5px 10px;border-radius:5px;background:var(--accent2);color:#fff;font-size:11px;margin-bottom:6px;font-family:inherit}
.pquick:hover{filter:brightness(1.15)}

/* OUTPUT */
.otabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 8px;overflow-x:auto}
.otab{padding:7px 12px;font-size:11px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}
.otab:hover{color:var(--text)}.otab.act{color:var(--accent);border-bottom-color:var(--accent)}
.opane{display:none;flex:1;overflow:hidden;min-height:0}.opane.act{display:flex;flex-direction:column}
#con-lines{flex:1;overflow-y:auto;padding:7px 10px;font-family:var(--mono);font-size:11.5px;line-height:1.65}
.cline{white-space:pre-wrap;word-break:break-all;padding:0 2px}
.cts{color:var(--text3);font-size:9px;margin-right:6px;user-select:none}
.cprint{color:var(--text)}.cgate{color:var(--cyan)}.cerror{color:var(--red)}.cwarn{color:var(--orange)}
.csuccess{color:var(--green)}.ctiming{color:var(--orange)}.cdebug{color:var(--text3)}.cinfo{color:var(--text2)}
.cetl{color:#22D3EE}.cdsl{color:var(--purple)}.canswer{color:#66BB6A;font-weight:600}
.cexception{color:#FF9800;font-style:italic}
#chart-pane{flex:1;overflow-y:auto;padding:10px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;flex:1;min-width:240px;max-width:420px}
.cct{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px}
.ccw{position:relative;height:180px}
#table-pane{flex:1;overflow:auto}
.tbtb{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;background:var(--bg2)}
.tbtb input{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 8px;color:var(--text);font-size:11px;width:160px}
.tbi{font-size:10px;color:var(--text3);margin-left:auto;font-family:var(--mono)}
.dtbl{width:100%;border-collapse:collapse;font-size:11px}
.dtbl th{background:var(--bg4);padding:5px 10px;text-align:left;color:var(--text2);font-size:9px;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
.dtbl th:hover{color:var(--text)}.dtbl td{padding:4px 10px;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--mono)}
.dtbl tr:hover td{background:var(--bg3)}.ncell{color:var(--cyan)}.nullc{color:var(--text3);font-style:italic}
#dsl-pane{flex:1;overflow:auto;background:var(--bg)}
#dsl-pre{padding:12px;font-family:var(--mono);font-size:12px;line-height:1.7;white-space:pre}
.dk{color:#ff79c6}.df{color:#50fa7b}.ds2{color:#f1fa8c}.dn{color:#bd93f9}.dc{color:var(--text3);font-style:italic}
#video-pane{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
#profile-pane{flex:1;overflow:auto;padding:8px}

/* WIRES */
.wire{fill:none;stroke-width:2.5;stroke-linecap:round;cursor:pointer;opacity:.85}
.wire:hover{stroke-width:4;opacity:1}.wire.sel{stroke-width:4;filter:drop-shadow(0 0 4px currentColor)}
.wire.quantum{stroke:#A78BFA}.wire.dataset{stroke:#22D3EE}.wire.result{stroke:#34D399}
.wire.number{stroke:#60A5FA}.wire.any{stroke:#6B7280}.wire.model{stroke:#A78BFA}
.wdraft{fill:none;stroke:#58A6FF;stroke-width:2;stroke-dasharray:6,3;pointer-events:none}
.snap-ring{fill:none;stroke:#58A6FF;stroke-width:2;stroke-dasharray:4,2;pointer-events:none}

/* MODAL */
#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;display:flex;align-items:center;justify-content:center}
#modal-ov.hid{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.9);display:flex;flex-direction:column;max-height:88vh;overflow:hidden}
.mh{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.mt{font-size:15px;font-weight:700;flex:1}
.mc{width:28px;height:28px;border-radius:6px;background:transparent;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--bg3);color:var(--red)}
.mbod{flex:1;overflow-y:auto;padding:16px 18px}
.exg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.exf{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.exp{padding:3px 11px;border-radius:16px;font-size:11px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all .15s}
.exp:hover,.exp.act{background:var(--accent2);border-color:var(--accent);color:#fff}
.exc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s}
.exc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.exct{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.extit{font-size:13px;font-weight:600;margin-bottom:3px}
.exd{font-size:11px;color:var(--text2);line-height:1.45}
.exm{display:flex;gap:7px;margin-top:8px;font-size:10px}
.dp-B{background:#0d3321;color:#3fb950;padding:1px 7px;border-radius:8px;font-weight:600}
.dp-I{background:#2d2106;color:#d29922;padding:1px 7px;border-radius:8px;font-weight:600}
.dp-A{background:#2d0d0d;color:#f85149;padding:1px 7px;border-radius:8px;font-weight:600}

/* SETTINGS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:13px}
.sct{font-size:10px;font-weight:700;color:var(--text);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.sr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sl{font-size:12px;color:var(--text2)}
.tgl{width:34px;height:18px;background:var(--bg4);border-radius:9px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--accent2)}.tgl::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.tgl.on::after{transform:translateX(16px)}
.si{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--text);font-size:11px;width:80px}
.ssel{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--text);font-size:11px;width:130px}
.hidden{display:none!important}
select option{background:var(--bg2)}
</style>
</head>
<body>
<div id="app">

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="logo">⟨ψ⟩ SANSQRIT</span>
  <span style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-right:4px">v3.2</span>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" id="btn-run">▶ Run</button>
  <button class="tb-btn" id="btn-compile" style="color:var(--purple)">🔨 Compile</button>
  <button class="tb-btn danger" id="btn-stop" disabled>■ Stop</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-new">📄 New</button>
  <button class="tb-btn" id="btn-save">💾 Save</button>
  <button class="tb-btn" id="btn-load">📂 Load</button>
  <button class="tb-btn" id="btn-data">🗂 Data</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-align">⊞ Align</button>
  <button class="tb-btn" id="btn-examples">🎯 Examples</button>
  <button class="tb-btn" id="btn-settings">⚙ Settings</button>
  <span style="font-size:11px;color:var(--text3)">Wire:</span>
  <select id="wire-type" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:5px;font-size:11px">
    <option value="curved">〰 Curved</option>
    <option value="straight">━ Straight</option>
    <option value="stepped">⌐ Stepped</option>
  </select>
  <div class="tb-sep"></div>
  <div class="tb-right">
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled style="font-size:16px;padding:3px 8px">↩</button>
    <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled style="font-size:16px;padding:3px 8px">↪</button>
    <div class="tb-sep"></div>

const BLOCK_TYPE_ALIASES={
  q_register:'quantum_register',
  table_block:'table_display',
  histogram_plot:'histogram_chart',
  heatmap_plot:'heatmap_chart',
  console_log_block:'log_block',
  normalize_block:'normalize',
  missing_impute:'fill_nulls',
  encode_features:'encode',
  filter_block:'filter_rows',

  groupby_block:'group_by',

};
const SINGLE_QUBIT_GATES=new Set(['h_gate','x_gate','y_gate','z_gate','s_gate','t_gate','sdg_gate','tdg_gate','sx_gate','rx_gate','ry_gate','rz_gate']);
function canonicalBlockType(type){return BLOCK_TYPE_ALIASES[type]||type;}
function parseColumnExpr(expr){
  const s=String(expr||'').trim();
  const m=s.match(/(?:row|x)\[['"]([^'"]+)['"]\]/)||s.match(/(?:row|x)\.([A-Za-z0-9_]+)/);
  return (m&&(m[1]||m[2])) || s.replace(/[^A-Za-z0-9_]/g,'') || '';
}
function normalizeLoadedParams(type, raw){
  const p={...(raw||{})};
  if(!p.filename&&p.file_path)p.filename=p.file_path;
  if(!p.file_path&&p.filename)p.file_path=p.filename;
  if(SINGLE_QUBIT_GATES.has(type)&&p.qubit===undefined&&p.target!==undefined)p.qubit=p.target;
  if((type==='cz_gate'||type==='swap_gate')){
    if(p.qubit_a===undefined&&p.qa!==undefined)p.qubit_a=p.qa;
    if(p.qubit_b===undefined&&p.qb!==undefined)p.qubit_b=p.qb;
  }
  if(type==='filter_rows'&&p.condition&&!p.column){
    const m=String(p.condition).match(/row(?:\[['"]([^'"]+)['"]\]|\.([A-Za-z0-9_]+))\s*(==|!=|>=|<=|>|<|contains)\s*['"]?([^'"]+)['"]?/);
    if(m){p.column=m[1]||m[2];p.operator=m[3];p.value=m[4];}
  }
  if(type==='sort_rows'&&!p.column)p.column=parseColumnExpr(p.key_expr)||'row_id';
  if(type==='sort_rows'&&!p.order)p.order=(p.descending===true||p.descending==='true')?'desc':'asc';
  if(type==='group_by'&&!p.group_by)p.group_by=parseColumnExpr(p.key_fn)||'row_id';
  if(type==='group_by'&&!p.aggregations)p.aggregations='[]';
  if(type==='pivot'&&!p.aggfn)p.aggfn=p.aggfunc||'sum';
  if(type==='normalize'&&!p.columns)p.columns=p.column||'';
  if(type==='encode'&&!p.column)p.column=p.columns||'';
  if(type==='fill_nulls'&&!p.strategy)p.strategy=p.method||'value';
  if(type==='log_block'&&!p.label)p.label=p.message||p.value||p.output_var||'Log';
  return p;
}
function normalizeExampleBlock(bd){
  const rawType=bd.type||bd.defId||bd.blockId||bd.id;
  const type=canonicalBlockType(rawType);
  return {...bd,type,rawType,params:normalizeLoadedParams(type,bd.params||{})};
}
function firstPortName(def,dir){
  const list=dir==='out'?(def?.outs||[]):(def?.ins||[]);
  return list[0]?.n||null;
}
function normalizeWirePort(blockId,port,dir){
  const b=ST.blocks.get(blockId);if(!b)return port;
  const list=dir==='out'?(b.def.outs||[]):(b.def.ins||[]);
  if(list.some(p=>p.n===port))return port;
  const aliases=dir==='out'
    ? ['dataset','result','out','ro','qo','hist','profile','matrix','model','filtered','sorted','grouped','pivot','value','data']
    : ['dataset','data','in','ri','qi','ai','value','profile','matrix','left_dataset','right_dataset'];
  for(const a of aliases){const p=list.find(x=>x.n===a);if(p)return p.n;}
  return firstPortName(b.def,dir)||port;
}

class Panel{
  constructor(o){
    this.id=o.id; this.minimized=false;
    this.el=ce('div','panel'); this.el.id='pnl-'+o.id;
    this.el.style.cssText=`left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px`;
    const hdr=ce('div','ph');
    hdr.innerHTML=`<span class="pi">${o.icon||'◆'}</span><span class="pt">${o.title}</span><div class="pbtns"><button class="pb" data-a="min" title="Minimize">−</button><button class="pb" data-a="max" title="Maximize">□</button></div>`;
    this.body=ce('div','pbody'); this.body.innerHTML=o.html||'';
    const rh=ce('div','rh');
    this.el.append(hdr,this.body,rh);
    document.getElementById('app').appendChild(this.el);
    this._drag(hdr); this._resize(rh);
    hdr.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{
      const a=b.dataset.a;
      if(a==='min'){this.minimized=!this.minimized;this.body.style.display=this.minimized?'none':'';this.el.style.height=this.minimized?'32px':'';}
      if(a==='max'){if(this.el.dataset.prev){this.el.style.cssText=this.el.dataset.prev;delete this.el.dataset.prev;}else{this.el.dataset.prev=this.el.style.cssText;this.el.style.cssText='left:0;top:66px;width:100vw;height:calc(100vh - 66px);z-index:150;';}}
    }));
  }
  _drag(hdr){
    hdr.addEventListener('mousedown',e=>{
      if(e.target.closest('.pb'))return;
      e.preventDefault(); front(this.el);
      const r=this.el.getBoundingClientRect(), ox=e.clientX-r.left, oy=e.clientY-r.top;
      const mv=ev=>{const nx=Math.max(-this.el.offsetWidth+60,Math.min(window.innerWidth-60,ev.clientX-ox));const ny=Math.max(0,Math.min(window.innerHeight-40,ev.clientY-oy));this.el.style.left=nx+'px';this.el.style.top=ny+'px';};
      const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
  }
  _resize(rh){
    rh.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const r=this.el.getBoundingClientRect(),sw=r.width,sh=r.height,sx=e.clientX,sy=e.clientY;
      const mv=ev=>{this.el.style.width=Math.max(180,sw+(ev.clientX-sx))+'px';this.el.style.height=Math.max(60,sh+(ev.clientY-sy))+'px';};
      const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
  }
}

function buildPalette(q){
  const list=$('pal-list'); if(!list)return;
  q=String(q||'').toLowerCase().trim();
  list.innerHTML='';
  let found=0;
  CAT_ORDER.forEach(catKey=>{
    const ci=CATS[catKey]; if(!ci)return;
    const items=Object.values(BD).filter(b=>b.cat===catKey&&(!q||b.label.toLowerCase().includes(q)||b.id.includes(q)||(b.desc||'').toLowerCase().includes(q)));
    if(!items.length)return;
    found+=items.length;
    const wrap=ce('div');
    const hdr=ce('div','pch');
    hdr.style.borderLeft='3px solid '+ci.color;
    hdr.innerHTML=`<span class="arr">▾</span><span style="flex:1">${ci.label}</span><span style="font-size:9px;background:var(--bg3);color:var(--text3);padding:1px 5px;border-radius:8px">${items.length}</span>`;
    const body=ce('div','pcb');
    const colKey='sk-c-'+catKey;
    if(!q&&localStorage.getItem(colKey)==='1'){hdr.classList.add('coll');body.style.display='none';}
    hdr.addEventListener('click',()=>{const c=hdr.classList.toggle('coll');body.style.display=c?'none':'';if(!q)localStorage.setItem(colKey,c?'1':'0');});
    items.sort((a,b)=>a.label.localeCompare(b.label)).forEach(b=>{
      const it=ce('div','pitem'); it.draggable=true; it.dataset.bid=b.id;
      it.innerHTML=`<span class="pii" style="color:${b.color}">${b.icon||'◆'}</span><span class="pil">${b.label}</span>`;
      it.title=b.desc||b.label;
      it.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',JSON.stringify({type:'block',bid:b.id}));e.dataTransfer.effectAllowed='copy';});
      it.addEventListener('dblclick',()=>addBlock(b.id,snap(100+ST.blocks.size*30),snap(160+Math.floor(ST.blocks.size/3)*180)));
      body.appendChild(it);
    });
    wrap.append(hdr,body); list.appendChild(wrap);
  });
  if(!found) list.innerHTML=`<div class="pno">No blocks matching "<b>${esc(q)}</b>"<br><small>Try: filter, join, H, grover, normalize…</small></div>`;
}
$('pal-s').addEventListener('input',e=>buildPalette(e.target.value));
$('pal-s').addEventListener('keydown',e=>{if(e.key==='Escape'){$('pal-s').value='';buildPalette('');}});

async function loadServerBlocks(){
  if(_serverBlocksPromise)return _serverBlocksPromise;
  _serverBlocksPromise=(async()=>{
  try{
    const res=await fetch('/api/blocks');
    const {blocks,categories}=await res.json();
    if(!blocks||!blocks.length)return false;
    // Add server categories
    if(categories){
      Object.entries(categories).forEach(([k,v])=>{
        const catId='srv_'+k;
        if(!CATS[catId]) CATS[catId]={id:catId,label:v.label||k,color:v.color||'#374151'};
        if(!CAT_ORDER.includes(catId)) CAT_ORDER.push(catId);
      });
    }
    // Add blocks
    let added=0;
    blocks.forEach(b=>{
      if(!b.id||BD[b.id])return; // skip if already local
      const params=(b.params||[]).filter(p=>!['bypass','code_override','override_code'].includes(p.key||p.name||'')).map(p=>({
        k:p.key||p.name||'v',l:p.label||p.key||'Value',
        t:({number:'number',angle:'number',qubit:'number',bool:'select',select:'select',code:'textarea',json:'textarea'})[p.type]||'text',
        d:p.value!==undefined?p.value:(p.default!==undefined?p.default:''),
        min:p.min,max:p.max,step:p.step,opts:p.options||null,
      }));
      const ins=(b.inputs||[]).filter(p=>(p.dir||'in')==='in').map(p=>({n:p.id||p.name||'in',t:p.dt||p.type||'any',l:p.label||p.id||'in'}));
      const outs=(b.outputs||[]).map(p=>({n:p.id||p.name||'out',t:p.dt||p.type||'any',l:p.label||p.id||'out'}));
      BD[b.id]={
        id:b.id,label:b.label,cat:'srv_'+(b.cat||'utility'),
        color:b.color||'#374151',icon:b.icon||'◆',desc:typeof b.info==='string'?b.info:(b.description||''),
        params,ins,outs,isViz:false,vizType:null,
        code:(p)=>{
          if((b.id||'').startsWith('applied_')){
            const out=p.output_var||('result_'+(b.id||'applied').replace(/[^a-zA-Z0-9_]/g,'_'));
            const qs=v=>JSON.stringify(String(v||''));
            return `let ${out} = applied_solver(problem=${qs(p.problem_name||b.label)}, domain=${qs(p.domain_id||b.cat||'applied')}, method=${qs(p.method||'Hybrid solver')}, objective=${qs(p.objective||'rank candidates')}, samples=${Number(p.sample_size)||25})\nprint(${out})`;
          }
          if(b.toSq){try{return b.toSq(p);}catch(e){return '-- '+b.label;}}
          return `-- ${b.label}`;
        },
      };
      added++;
    });
    const total=Object.keys(BD).length;
    addLog('success',`✓ Loaded ${added} server blocks (${total} total across ${CAT_ORDER.length} categories)`);
    const bv=$('blk-v'); if(bv)bv.textContent=total+' blocks';
    buildPalette($('pal-s').value||'');
    return true;
  }catch(e){addLog('warn','Could not load server blocks: '+e.message);return false;}
  })();
  return _serverBlocksPromise;
}
async function ensureServerBlocks(){return loadServerBlocks();}

// ════════════════════════════════════════════════════
function addBlock(type,x,y,_id,_params){
  type=canonicalBlockType(type);
  _params=normalizeLoadedParams(type,_params||{});
  const b=BD[type]; if(!b)return null;
  const id=_id||gid();
  const params={};
  (b.params||[]).forEach(p=>{params[p.k]=_params&&_params[p.k]!==undefined?_params[p.k]:p.d;});
  Object.entries(_params||{}).forEach(([k,v])=>{if(params[k]===undefined)params[k]=v;});
  const el=buildBlockEl(id,b,params);
  el.style.left=x+'px'; el.style.top=y+'px';
  $('cb').appendChild(el);
  const block={id,type,uid:'u'+Date.now().toString(36)+'_'+gid(),def:b,el,x,y,params,flags:{bypass:!!params.bypass,trycatch:false,printio:false}};
  if(block.flags.bypass)el.classList.add('bypassed');
  ST.blocks.set(id,block);
  bindBlockEvents(block);
  hint();
  return block;
}

function buildBlockEl(id,b,params){
  const wrap=ce('div','vb'); wrap.dataset.bid=id;
  // Header
  const hdr=ce('div','vbh'); hdr.style.background=b.color||'#374151';
  hdr.innerHTML=`<span class="vbicon">${b.icon||'◆'}</span><span class="vbtitle">${b.label}</span><span class="vbcat">${(CATS[b.cat]||{}).label||''}</span>`;
  wrap.appendChild(hdr);
  // Body (preview params)
  const body=ce('div','vbb');
  const visPar=(b.params||[]).filter(p=>!['label'].includes(p.k)).slice(0,3);
  visPar.forEach(p=>{
    const row=ce('div','vbrow');
    const lbl=ce('span','vblbl'); lbl.textContent=p.l+':';
    const val=ce('span','vbval'); val.textContent=String(params[p.k]??p.d??'').slice(0,20);
    row.append(lbl,val); body.appendChild(row);
  });
  wrap.appendChild(body);
  // Ports
  const ports=ce('div','vbports');
  const inc=ce('div','pincol');
  const outc=ce('div','poutcol');
  (b.ins||[]).forEach(p=>{
    const row=ce('div','portrow');
    const dot=ce('span','dot '+(p.t||'any'));
    dot.dataset.bid=id; dot.dataset.port=p.n; dot.dataset.dir='in'; dot.title=p.l||p.n;
    const lbl=ce('span'); lbl.textContent=p.l||p.n; lbl.style='font-size:9px;color:var(--text3)';
    row.append(dot,lbl); inc.appendChild(row);
  });
  (b.outs||[]).forEach(p=>{
    const row=ce('div','portrow out');
    const dot=ce('span','dot '+(p.t||'any'));
    dot.dataset.bid=id; dot.dataset.port=p.n; dot.dataset.dir='out'; dot.title=p.l||p.n;
    const lbl=ce('span'); lbl.textContent=p.l||p.n; lbl.style='font-size:9px;color:var(--text3)';
    row.append(dot,lbl); outc.appendChild(row);
  });
  ports.append(inc,outc); wrap.appendChild(ports);
  // Flags
  const flags=ce('div','vbflags');
  const mkFlag=(key,lbl,cls)=>{
    const f=ce('label','vbflag '+cls); f.title=`${lbl} — click to toggle`;
    const cb=document.createElement('input'); cb.type='checkbox';
    const sp=ce('span'); sp.textContent=lbl;
    f.append(cb,sp);
    cb.addEventListener('change',e=>{
      e.stopPropagation();
      const block=ST.blocks.get(id); if(!block)return;
      block.flags[key]=cb.checked;
      if(key==='bypass')block.el.classList.toggle('bypassed',cb.checked);
      addLog('info',(cb.checked?'⚡ ':'✓ ')+lbl+' '+(cb.checked?'ON':'OFF')+': '+block.def.label);
    });
    return f;
  };
  flags.append(mkFlag('bypass','⚡ Bypass','bypass-flag'),mkFlag('trycatch','🛡 Try','tc-flag'),mkFlag('printio','🖨 I/O','pio-flag'));
  wrap.appendChild(flags);
  // Resize handle
  const rh=ce('div','vrh'); rh.title='Drag to resize';
  wrap.appendChild(rh);
  // Bind resize on rh
  rh.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    const r=wrap.getBoundingClientRect(),sw=r.width,sh=r.height,sx=e.clientX,sy=e.clientY;
    const mv=ev=>{wrap.style.width=Math.max(160,sw+(ev.clientX-sx)*(1/ST.vs))+'px';wrap.style.height='auto';redrawWires();};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
  return wrap;
}

function bindBlockEvents(block){
  if(!block||!block.el)return;
  const el=block.el;
  el.querySelectorAll('.vbflag').forEach(flag=>{
    const cb=flag.querySelector('input');
    if(!cb)return;
    const key=flag.classList.contains('bypass-flag')?'bypass':flag.classList.contains('tc-flag')?'trycatch':'printio';
    cb.checked=!!block.flags[key];
  });
  el.addEventListener('dblclick',e=>{
    if(e.target.closest('.dot,.vbflag,.vrh,input,select,textarea,button'))return;
    e.preventDefault();e.stopPropagation();
    front(el);selBlock(block.id);
  });
}

function updateBlockDisplay(b){
  const body=b.el.querySelector('.vbb'); if(!body)return;
  body.innerHTML='';
  const visPar=(b.def.params||[]).filter(p=>!['label'].includes(p.k)).slice(0,3);

    const row=ce('div','vbrow');
    const lbl=ce('span','vblbl'); lbl.textContent=p.l+':';
    const val=ce('span','vbval'); val.textContent=String(b.params[p.k]??p.d??'').slice(0,20);
    row.append(lbl,val); body.appendChild(row);

}

function isFileSourceBlock(b){
  if(!b)return false;
  return ['csv_reader','json_reader','xml_reader','excel_reader'].includes(b.type)
    || (b.def.cat==='etl_src'&&['filename','file_path','path'].some(k=>b.params[k]!==undefined));
}
function fileParamKey(b){
  if(b.params.filename!==undefined)return 'filename';
  if(b.params.file_path!==undefined)return 'file_path';
  if(b.params.path!==undefined)return 'path';
  return 'filename';
}
function acceptForBlockType(type){
  if(type==='json_reader')return '.json,.txt';
  if(type==='xml_reader')return '.xml,.txt';
  if(type==='excel_reader')return '.xlsx,.xls';
  return '.csv,.tsv,.json,.xml,.xlsx,.xls,.txt';
}
function uploadForBlock(bid){
  const b=ST.blocks.get(bid);if(!b)return;
  const inp=document.createElement('input');
  inp.type='file';inp.accept=acceptForBlockType(b.type);inp.style.display='none';
  inp.addEventListener('change',async()=>{
    const f=inp.files&&inp.files[0];document.body.removeChild(inp);if(!f)return;
    await handleLocalFiles([f]);
    const key=fileParamKey(b);
    b.params[key]=f.name;
    b.params.filename=f.name;
    b.params.file_path=f.name;
    updateBlockDisplay(b);
    showProps(bid);
    addLog('success','Linked '+f.name+' to '+b.def.label);
  });
  document.body.appendChild(inp);inp.click();
}
function previewSourceBlock(bid){runSingleBlock(bid);}

// WIRE SYSTEM
// ════════════════════════════════════════════════════
const WC={quantum:'#A78BFA',dataset:'#22D3EE',result:'#34D399',number:'#60A5FA',any:'#6B7280',model:'#F472B6'};
function wirePath(x1,y1,x2,y2){
  switch(ST.wireType){
    case 'straight':return `M ${x1} ${y1} L ${x2} ${y2}`;
    case 'stepped':{const mx=(x1+x2)/2;return `M ${x1} ${y1} L ${mx} ${y1} L ${mx} ${y2} L ${x2} ${y2}`;}
    default:{const cx=(x1+x2)/2;return `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`;}
  }
}
function portSP(bid,port,dir){
  const b=ST.blocks.get(bid);if(!b)return null;
  const dot=b.el.querySelector(`.dot[data-port="${port}"][data-dir="${dir}"]`);if(!dot)return null;
  const ca=$('canvas-area').getBoundingClientRect();const dr=dot.getBoundingClientRect();
  return{x:dr.left+dr.width/2-ca.left,y:dr.top+dr.height/2-ca.top,type:dot.classList[1]||'any'};
}
function redrawWires(){ST.wires.forEach(drawWire);}
function drawWire(w){
  const fp=portSP(w.fid,w.fp,'out'),tp=portSP(w.tid,w.tp,'in');
  if(!fp||!tp||!w.el)return;
  const d=wirePath(fp.x,fp.y,tp.x,tp.y);
  w.el.setAttribute('d',d);
  w.el.setAttribute('stroke',WC[fp.type]||WC.any);
  w.el.setAttribute('marker-end','url(#arr)');
  if(w.hit)w.hit.setAttribute('d',d);
}
function addWire(fid,fp,tid,tp){
  for(const w of ST.wires.values())if(w.fid===fid&&w.fp===fp&&w.tid===tid&&w.tp===tp)return;
  const id='w'+(_nid++);
  const el=document.createElementNS('http://www.w3.org/2000/svg','path');
  el.classList.add('wire');el.dataset.wid=id;
  const b=ST.blocks.get(fid);const dot=b?.el?.querySelector(`.dot[data-port="${fp}"]`);
  const type=dot?.classList[1]||'any';el.classList.add(type);
  // Wide invisible hit area for easy clicking
  const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
  hit.setAttribute('fill','none');
  hit.setAttribute('stroke','rgba(0,0,0,0)');
  hit.setAttribute('stroke-width','18');
  hit.style.cssText='cursor:pointer;pointer-events:stroke';
  // Wrap in group - pointer-events:all overrides parent none
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('style','pointer-events:all;cursor:pointer');
  g.appendChild(hit);
  g.appendChild(el);
  $('wg').appendChild(g);
  function _clickWire(e){e.stopPropagation();e.preventDefault();selWire(id);}
  g.addEventListener('click',_clickWire,true);
  g.addEventListener('mousedown',e=>e.stopPropagation(),true);
  const wire={fid,fp,tid,tp,el,hit,g};ST.wires.set(id,wire);drawWire(wire);
}
function delWire(id){const w=ST.wires.get(id);if(w?.g)w.g.remove();else if(w?.el)w.el.remove();ST.wires.delete(id);}

function selBlock(id){
  ST.blocks.forEach(b=>b.el.classList.remove('sel'));
  ST.wires.forEach(w=>{if(w.el)w.el.classList.remove('sel');});
  ST.selWire=null;ST.selected=id;
  if(id){ST.blocks.get(id)?.el.classList.add('sel');showProps(id);}
  else showPropsEmpty();
}
function selWire(id){
  ST.blocks.forEach(b=>b.el.classList.remove('sel'));
  ST.wires.forEach((w,wid)=>{if(w.el)w.el.classList.toggle('sel',wid===id);});
  ST.selected=null;ST.selWire=id;showPropsEmpty();
}
function delSelected(){
  if(ST.selWire){delWire(ST.selWire);ST.selWire=null;return;}
  if(ST.selected){
    const b=ST.blocks.get(ST.selected);if(b)b.el.remove();ST.blocks.delete(ST.selected);
    [...ST.wires.entries()].forEach(([wid,w])=>{if(w.fid===ST.selected||w.tid===ST.selected)delWire(wid);});
    ST.selected=null;showPropsEmpty();hint();
  }
}

// CANVAS MOUSE EVENTS
// ════════════════════════════════════════════════════
const SVG=$('wsvg'),SNAP_R=55;
function findSnap(sx,sy,excId){
  let best=null,bestD=SNAP_R;
  ST.blocks.forEach(b=>{
    if(b.id===excId)return;
    b.el.querySelectorAll('.dot[data-dir="in"]').forEach(dot=>{
      const ca=$('canvas-area').getBoundingClientRect();const dr=dot.getBoundingClientRect();
      const px=dr.left+dr.width/2-ca.left,py=dr.top+dr.height/2-ca.top;
      const d=Math.hypot(sx-px,sy-py);
      if(d<bestD){bestD=d;best={bid:dot.dataset.bid,port:dot.dataset.port,sx:px,sy:py};}
    });
  });
  return best;
}

// Block mousedown (drag + select)
document.addEventListener('mousedown',e=>{
  const dot=e.target.closest('.dot[data-dir="out"]');
  if(dot){
    e.preventDefault();e.stopPropagation();
    const ca=$('canvas-area').getBoundingClientRect();const dr=dot.getBoundingClientRect();
    const sx=dr.left+dr.width/2-ca.left,sy=dr.top+dr.height/2-ca.top;const cp=s2c(sx,sy);
    ST.drawWire={fid:dot.dataset.bid,fp:dot.dataset.port,sx:cp.x,sy:cp.y,type:dot.classList[1]||'any'};
    $('draft').style.display='block'; return;
  }
  const vbEl=e.target.closest('.vb');

function fitView(){
  if(!ST.blocks.size){ST.vs=1;ST.vx=60;ST.vy=60;applyVP();return;}
  let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
  ST.blocks.forEach(b=>{mx=Math.min(mx,b.x);my=Math.min(my,b.y);Mx=Math.max(Mx,b.x+210);My=Math.max(My,b.y+160);});
  const ca=$('canvas-area').getBoundingClientRect(),pad=60;
  ST.vs=Math.min(1.2,Math.min((ca.width-pad*2)/(Mx-mx||1),(ca.height-pad*2)/(My-my||1)));
  ST.vx=-mx*ST.vs+pad;ST.vy=-my*ST.vs+pad;applyVP();
}

// AUTO-ALIGN
// ════════════════════════════════════════════════════
function autoAlign(){
  if(!ST.blocks.size){addLog('warn','Canvas is empty');return;}
  // Topological sort → assign depth
  const inDeg=new Map();ST.blocks.forEach((_,id)=>inDeg.set(id,0));
  ST.wires.forEach(w=>inDeg.set(w.tid,(inDeg.get(w.tid)||0)+1));
  const q=[...inDeg.entries()].filter(([,v])=>v===0).map(([k])=>k);
  const order=[];
  while(q.length){const c=q.shift();order.push(c);ST.wires.forEach(w=>{if(w.fid===c){const n=(inDeg.get(w.tid)||1)-1;inDeg.set(w.tid,n);if(!n)q.push(w.tid);}});}
  ST.blocks.forEach((_,id)=>{if(!order.includes(id))order.push(id);});
  const depth=new Map();order.forEach(id=>depth.set(id,0));
  ST.wires.forEach(w=>{const d=(depth.get(w.fid)||0)+1;if(d>(depth.get(w.tid)||0))depth.set(w.tid,d);});
  const cols=new Map();depth.forEach((d,id)=>{if(!cols.has(d))cols.set(d,[]);cols.get(d).push(id);});
  const sorted=[...cols.entries()].sort((a,b)=>a[0]-b[0]);
  let x=80;
  sorted.forEach(([,ids])=>{
    ids.forEach((id,row)=>{
      const b=ST.blocks.get(id);if(!b)return;
      const tx=x,ty=80+row*180;
      animateTo(b,tx,ty);
    });
    x+=280;
  });
  setTimeout(()=>{redrawWires();fitView();},400);
  addLog('success',`⊞ Aligned ${ST.blocks.size} blocks into ${sorted.length} columns`);
}
function animateTo(b,tx,ty){
  const sx=b.x,sy=b.y,dur=350,t0=performance.now();
  const ease=t=>t<.5?2*t*t:-1+(4-2*t)*t;
  (function step(now){
    const t=Math.min(1,(now-t0)/dur),e=ease(t);
    b.x=Math.round(sx+(tx-sx)*e);b.y=Math.round(sy+(ty-sy)*e);
    b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';
    redrawWires();if(t<1)requestAnimationFrame(step);
  })(t0);
}

  Object.entries(profile.stats||{}).forEach(([col,s])=>{
    const np=s.null_pct||0;

    <td class="ncell">${s.max!==undefined?fmt(s.max):''}</td><td class="ncell">${s.std!==undefined?fmt(s.std):''}</td></tr>`;

function renderViz(vizType,data,params,port){
  switch(vizType){

    case 'pie':if(typeof data==='object'&&!Array.isArray(data))renderPie(data,params.title);else if(data?.rows){const h={};data.rows.forEach(r=>{const v=String(r[data.columns[0]]||'');h[v]=(h[v]||0)+1;});renderPie(h,params.title);}break;
    case 'bar':if(data?.rows&&data?.columns){const yc=params.y_col||data.columns[data.columns.length-1],lc=params.x_col||data.columns[0];const h=Object.fromEntries(data.rows.map(r=>[String(r[lc]||''),parseFloat(r[yc])||0]));renderBar(h,params.title,params.orientation);}else if(typeof data==='object'&&!Array.isArray(data))renderBar(data,params.title,params.orientation);break;
    case 'line':if(data?.rows)renderLine(data.rows,data.columns,params.x_col,params.y_col,params.title);break;
    case 'scatter':if(data?.rows)renderScatter(data.rows,params.x_col||data.columns?.[0],params.y_col||data.columns?.[1],params.title);break;
    case 'heatmap':if(data?.matrix&&data?.columns)renderHeatmap(data.matrix,data.columns,params.title);break;
    case 'statevector':if(Array.isArray(data))renderStatevector(data,params.title);break;
    case 'gauge':if(typeof data==='number')renderGauge(data,params);break;

  }
}

function topoSort(){
  const inDeg=new Map();ST.blocks.forEach((_,id)=>inDeg.set(id,0));
  ST.wires.forEach(w=>inDeg.set(w.tid,(inDeg.get(w.tid)||0)+1));
  const q=[...inDeg.entries()].filter(([,v])=>v===0).map(([k])=>k),order=[];
  while(q.length){const c=q.shift();order.push(c);ST.wires.forEach(w=>{if(w.fid===c){const n=(inDeg.get(w.tid)||1)-1;inDeg.set(w.tid,n);if(!n)q.push(w.tid);}});}
  ST.blocks.forEach((_,id)=>{if(!order.includes(id))order.push(id);});return order;
}
function getReg(id){
  for(const w of ST.wires.values()){if(w.tid===id&&w.tp==='in'){const fb=ST.blocks.get(w.fid);if(fb?.type==='quantum_register')return fb.params.name||'q';const r=getReg(w.fid);if(r)return r;}}return null;
}
function blocksToCode(){
  if(!ST.blocks.size)return'';
  const lines=['-- Generated by Sanskrit Visual Builder v3.2','-- ETL + Data Science + Quantum',''];
  topoSort().forEach(id=>{
    const b=ST.blocks.get(id);if(!b)return;
    const p=b.params,reg=getReg(id)||p.name||'q',sid=id.replace('b','');
    let line='';
    try{if(typeof b.def.code==='function')line=b.def.code(p,reg,sid);}catch(e){}
    if(line)lines.push(line);
  });
  return lines.join('\n');
}
function hlDSL(code){
  const kws=['let','mut','def','return','if','elif','else','for','while','in','and','or','not','true','false','import','molecule'];
  const fns=['qubits','H','X','Y','Z','S','T','Rx','Ry','Rz','CNOT','CZ','SWAP','Toffoli','measure','measure_all','statevector','grover','vqe','print'];
  let h=code;
  h=h.replace(/(--[^\n]*)/g,'<span class="dc">$1</span>');
  h=h.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="ds2">$1</span>');
  h=h.replace(/\b(\d+\.?\d*)\b/g,'<span class="dn">$1</span>');
  fns.forEach(f=>{h=h.replace(new RegExp('\\b('+f+')\\b','g'),'<span class="df">$1</span>');});
  kws.forEach(k=>{h=h.replace(new RegExp('\\b('+k+')\\b','g'),'<span class="dk">$1</span>');});
  return h;
}

async function runProgram(){
  if(ST.running)return;
  const hasETL=[...ST.blocks.values()].some(b=>!!clientOperationForBlock(b));
  const hasQ=[...ST.blocks.values()].some(b=>['q_reg','q_gate','q_meas','q_algo'].includes(b.def.cat)||b.type==='quantum_register');
  clearOutput();setRunning(true);

function clientOperationForBlock(b){
  if(!b)return null;
  if(b.type==='sample_data')return 'csv_reader';
  if(b.type&&b.type.startsWith('applied_'))return 'domain_solver';
  if(b.params&&b.params.domain_id&&b.params.problem_name)return 'domain_solver';
  if(b.def.cat&&b.def.cat.startsWith('srv_domain_'))return 'domain_solver';
  if(b.def.cat&&(b.def.cat.startsWith('etl')||b.def.cat==='ds'))return b.type;
  if(['csv_reader','json_reader','xml_reader','excel_reader','normalize','encode','filter_rows','sort_rows','group_by','pivot','validate_schema','profile'].includes(b.type))return b.type;
  return null;
}

async function runETL(){
  const order=topoSort(),outputs=new Map();
  for(const bid of order){
    const b=ST.blocks.get(bid);if(!b)continue;
    const inputs={};
    ST.wires.forEach(w=>{if(w.tid===bid){const up=outputs.get(w.fid);if(up&&up[w.fp]!==undefined){inputs[w.tp]=up[w.fp];if(!inputs.dataset&&up[w.fp]?.rows)inputs.dataset=up[w.fp];}}});
    if(b.def.isViz||b.def.cat==='out'||['q_reg','q_gate','q_meas','q_algo'].includes(b.def.cat)||!b.def.cat)continue;
    const op=clientOperationForBlock(b);
    if(!op){
      if(Object.keys(inputs).length){
        const passthrough=inputs.dataset||inputs.data||inputs.in||inputs.ai||Object.values(inputs)[0];
        const out={};
        (b.def.outs||[]).forEach(p=>{out[p.n]=passthrough;});
        if(passthrough?.rows)out.dataset=passthrough;
        if(passthrough!==undefined)outputs.set(bid,out);
      }
      continue;
    }
    if(b.flags.bypass){addLog('warn','⚡ Bypassed: '+b.def.label);const out={};if(inputs.dataset)out.dataset=inputs.dataset;(b.def.outs||[]).forEach(p=>{if(!out[p.n]&&inputs.dataset)out[p.n]=inputs.dataset;});outputs.set(bid,out);continue;}
    // print I/O input
    if(b.flags.printio&&inputs.dataset){const ds=inputs.dataset;addLog('print',`📥 ${b.def.label} INPUT: ${ds.total_rows||ds.rows?.length||0} rows × ${(ds.columns||[]).length} cols`);}
    let uploadedData=null;
    let uploadedFile=null;
    const fname=b.params.filename||b.params.file_path||b.params.dataset||b.params.path;
    if(fname&&ST.uploadedFiles[fname]){uploadedData=ST.uploadedFiles[fname].content;uploadedFile=ST.uploadedFiles[fname];}
    const execParams={...b.params};if(b.type==='sample_data')execParams.filename=b.params.dataset;
    addLog('etl','▶ '+b.def.label);
    let data;
    const exec=async()=>{const res=await fetch('/api/etl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operation:op,params:execParams,inputs,uploadedData,uploadedFile})});return res.json();};
    if(b.flags.trycatch){try{data=await exec();}catch(e){addLog('exception','🛡 Exception in '+b.def.label+': '+e.message);data={dataset:inputs.dataset||{columns:[],rows:[]}};} if(data?.error){addLog('exception','🛡 '+data.error);data={dataset:inputs.dataset||{columns:[],rows:[]}};}}
    else{try{data=await exec();}catch(e){addLog('error','✗ '+b.def.label+': '+e.message);continue;}if(data?.error){addLog('error','  ✗ '+data.error);continue;}}
    if(data.log)addLog('info','  '+data.log);
    const out={};
    if(data.dataset){out.dataset=data.dataset;(b.def.outs||[]).forEach(p=>{out[p.n]=data.dataset;});}
    if(data.train_dataset)out.dataset=data.train_dataset;
    if(data.test_dataset)out.test_dataset=data.test_dataset;if(data.model)out.model=data.model;
    if(data.result){out.report=data.result;out.score=data.result.best_score;}
    if(data.profile){out.profile=data.profile;(b.def.outs||[]).forEach(p=>{if(p.n==='profile')out[p.n]=data.profile;});}
    if(data.correlation_matrix){out.matrix=data.correlation_matrix;(b.def.outs||[]).forEach(p=>{if(p.n==='matrix')out[p.n]=data.correlation_matrix;});}
    outputs.set(bid,out);
    // print I/O output
    if(b.flags.printio&&data.dataset){addLog('print',`📤 ${b.def.label} OUTPUT: ${data.dataset.total_rows||data.dataset.rows?.length||0} rows × ${(data.dataset.columns||[]).length} cols`);if(data.dataset.rows?.length)addLog('print','   Sample: '+JSON.stringify(data.dataset.rows[0]).slice(0,120));}
    // Log to file
    try{fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries:[{ts:new Date().toISOString(),type:'etl',text:b.type+': '+(data.log||'')}]})});}catch(e){}
  }
  // Visualization blocks
  [...ST.blocks.values()].filter(b=>b.def.isViz&&!b.flags.bypass).forEach(vb=>{
    let cd=null;
    ST.wires.forEach(w=>{if(w.tid===vb.id){const up=outputs.get(w.fid);if(up)cd=up[w.fp];}});
    if(cd)renderViz(vb.def.vizType,cd,vb.params,'');
  });
  // Output blocks
  [...ST.blocks.values()].filter(b=>b.def.cat==='out'&&!b.flags.bypass).forEach(ob=>{
    ST.wires.forEach(w=>{if(w.tid===ob.id){const up=outputs.get(w.fid);if(!up)return;const d=up[w.fp];if(!d)return;
      if(ob.type==='print_block'||ob.type==='log_block')addLog('answer',JSON.stringify(d,null,2).slice(0,800));
      if(ob.type==='write_csv'&&d.rows)dlDataset(d,'csv',ob.params.filename||'output.csv');
      if(ob.type==='write_json'&&d.rows)dlDataset(d,'json',ob.params.filename||'output.json');
    }});
  });
}

async function runQuantum(code){
  const quantumCode=code.split('\n').filter(l=>{const t=l.trim();return t&&!t.startsWith('--ETL')&&!t.startsWith('-- CSV')&&!t.startsWith('-- JSON')&&!t.startsWith('-- Sample')&&!t.startsWith('-- Filter')&&!t.startsWith('-- Group')&&!t.startsWith('-- Sort')&&!t.startsWith('-- Join')&&!t.startsWith('-- Table')&&!t.startsWith('-- Histogram')&&!t.startsWith('-- Pie')&&!t.startsWith('-- Bar')&&!t.startsWith('-- Line')&&!t.startsWith('-- Scatter')&&!t.startsWith('-- Normalize')&&!t.startsWith('-- Encode')&&!t.startsWith('-- Split')&&!t.startsWith('-- Outlier')&&!t.startsWith('-- Dedup')&&!t.startsWith('-- Drop')&&!t.startsWith('-- Fill')&&!t.startsWith('-- Trim')&&!t.startsWith('-- Replace')&&!t.startsWith('-- Validate')&&!t.startsWith('-- Stats')&&!t.startsWith('-- Profile')&&!t.startsWith('-- Add col')&&!t.startsWith('-- Select')&&!t.startsWith('-- Rename')&&!t.startsWith('-- Cast')&&!t.startsWith('-- Merge')&&!t.startsWith('-- Correlation')&&!t.startsWith('-- Linear')&&!t.startsWith('-- Train')&&!t.startsWith('-- Describe')&&!t.startsWith('-- Unpivot')&&!t.startsWith('-- Pivot')&&!t.startsWith('-- Write')&&!t.startsWith('-- Log')&&!t.startsWith('-- Heatmap')&&!t.startsWith('-- Top')&&!t.startsWith('-- Gauge')&&!t.startsWith('-- State')&&!t.startsWith('-- Scatter')&&!t.startsWith('-- Cross');}).join('\n').trim();
  if(!quantumCode||quantumCode===('-- Generated by Sanskrit Visual Builder v3.2\n-- ETL + Data Science + Quantum'))return;
  addLog('info','⚛ Running quantum circuit...');
  try{
    const res=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:quantumCode})});
    const d=await res.json();
    (d.outputs||[]).forEach(t=>addLog('print',t));
    (d.logs||[]).forEach(l=>{if(l.type!=='print')addLog(l.type||'info',l.text||l.m||'');});
    if(d.error)addLog('error','✗ '+d.error);
    if(d.elapsed_ms)addLog('timing','⏱ Quantum: '+d.elapsed_ms+'ms');
    // Render quantum viz blocks
    const vizBlocks=[...ST.blocks.values()].filter(b=>b.def.isViz&&!b.flags.bypass);
    (d.outputs||[]).forEach(out=>{try{const p=JSON.parse(out);if(typeof p==='object'&&!Array.isArray(p))vizBlocks.forEach(vb=>{if(vb.def.vizType==='histogram')renderHistogram(p,vb.params.title,vb.params.color);else if(vb.def.vizType==='table')renderTable({columns:Object.keys(p),rows:[p],total_rows:1},{title:vb.params.title});});}catch(e){}});
  }catch(e){addLog('error','Cannot reach server: '+e.message);}
}

function dlDataset(ds,fmt,filename){
  let c,t;if(fmt==='csv'){const e2=v=>/[",\n]/.test(String(v||''))?'"'+String(v||'').replace(/"/g,'""')+'"':String(v||'');c=[ds.columns.join(','),...ds.rows.map(r=>ds.columns.map(col=>e2(r[col]||'')).join(','))].join('\n');t='text/csv';}else{c=JSON.stringify(ds.rows,null,2);t='application/json';}
  const blob=new Blob([c],{type:t});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
  addLog('success','💾 Downloaded: '+filename);
}

function loadFromJSON(data){
  clearCanvas();if(!data?.blocks)return;
  // Suppress history/autosave during bulk load for performance
  window._bulkLoading = true;
  const idMap={};
  (data.blocks||[]).forEach(bd=>{
    const nb=normalizeExampleBlock(bd);
    const oldId=bd.id||bd.uid||nb.uid;
    const b=addBlock(nb.type,bd.x||100,bd.y||100,oldId,nb.params);
    if(b){
      b.uid=bd.uid||bd.id||b.uid;

      if(nb.rawType)idMap[nb.rawType]=b.id;

      if(nb.params?.bypass)b.flags.bypass=true;
      if(b.flags?.bypass)b.el.classList.add('bypassed');
    }
  });
  window._bulkLoading = false;

    (data.wires||[]).forEach(w=>{
      const fi=idMap[w.fid||w.fromId]||w.fid,ti=idMap[w.tid||w.toId]||w.tid;

async function openExamples(){
  const box=$('modal-box');box.style.width='960px';
  box.innerHTML=`<div class="mh"><span class="mt">🎯 Visual Block Examples</span><button class="mc" onclick="closeModal()">✕</button></div>
  <div class="mbod"><div class="exf" id="ex-f"></div><div class="exg" id="ex-g"><div style="color:var(--text3);padding:20px">Loading...</div></div></div>`;
  $('modal-ov').classList.remove('hid');
  let examples=[];
  const grid=$('ex-g');
  if(grid)grid.innerHTML='<div style="color:var(--text3);padding:20px">Preparing block registry...</div>';
  await ensureServerBlocks();
  if(grid)grid.innerHTML='<div style="color:var(--text3);padding:20px">Loading examples...</div>';
  try{const r=await fetch('/api/examples');examples=await r.json();}catch(e){}
  examples=[...examples,...LOCAL_EXAMPLES];
  const cats=[...new Set(examples.map(e=>e.cat||'General'))];
  const filt=$('ex-f');
  filt.innerHTML='<div class="exp act" data-cat="">All ('+examples.length+')</div>'+cats.map(c=>`<div class="exp" data-cat="${esc(c)}">${esc(c)}</div>`).join('');
  filt.querySelectorAll('.exp').forEach(p=>p.addEventListener('click',()=>{filt.querySelectorAll('.exp').forEach(x=>x.classList.remove('act'));p.classList.add('act');renderExGrid(examples,p.dataset.cat);}));
  renderExGrid(examples,'');
}
function renderExGrid(exs,cat){
  const grid=$('ex-g');
  const filtered=cat?exs.filter(e=>(e.cat||'')===cat):exs;
  if(!filtered.length){grid.innerHTML='<div style="color:var(--text3);padding:20px">No examples</div>';return;}
  grid.innerHTML='';
  filtered.forEach(ex=>{
    const d=ex.diff||'B';const dcls='dp-'+d;
    const blockCount=Array.isArray(ex.blocks)?ex.blocks.length:(Number(ex.blocks)||0);
    const card=ce('div','exc');
    card.innerHTML=`<div class="exct">${esc(ex.cat||'')}</div><div class="extit">${esc(ex.title||'')}</div><div class="exd">${esc(ex.desc||ex.description||'')}</div><div class="exm"><span class="${dcls}">${{B:'Beginner',I:'Intermediate',A:'Advanced'}[d]||d}</span><span style="color:var(--text3)">⬡ ${blockCount} blocks</span></div>`;
    card.addEventListener('click',()=>{
      closeModal();
      if(ST.blocks.size>0){
        var choice=confirm('Load "'+esc(ex.title||'Example')+'"?\n\nOK = Open in New Tab\nCancel = Replace current canvas');
        if(choice){_loadExNewTab(ex);}
        else{clearCanvas();loadFromJSON(ex);setTimeout(fitView,200);addLog('info','▶ '+esc(ex.title)+' · click Run!');}
      }else{clearCanvas();loadFromJSON(ex);setTimeout(fitView,200);addLog('info','▶ '+esc(ex.title)+' · click Run!');}
    });
    grid.appendChild(card);
  });
}
function closeModal(){$('modal-ov').classList.add('hid');}
$('modal-ov').addEventListener('click',e=>{if(e.target===$('modal-ov'))closeModal();});

// LOCAL FILE IMPORTS (CSV / JSON / XML / EXCEL)
// ════════════════════════════════════════════════════
function _extOf(name){
  const s=String(name||'').toLowerCase();
  const i=s.lastIndexOf('.');
  return i>=0 ? s.slice(i+1) : '';
}
function _readFileText(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result||''));
    r.onerror=()=>reject(r.error||new Error('File read failed'));
    r.readAsText(file);
  });
}
function _readFileBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const s=String(r.result||'');
      resolve(s.includes(',') ? s.split(',').slice(1).join(',') : s);
    };
    r.onerror=()=>reject(r.error||new Error('File read failed'));
    r.readAsDataURL(file);
  });
}
async function handleLocalFiles(files){
  if(!files||!files.length) return;
  const list=[...files];
  for(const file of list){
    const ext=_extOf(file.name);
    const kind=['xlsx','xls'].includes(ext) ? 'base64' : 'text';
    let content='';
    try{
      content = kind==='base64' ? await _readFileBase64(file) : await _readFileText(file);
      ST.uploadedFiles[file.name] = {
        name:file.name,
        size:file.size,
        type:file.type||'application/octet-stream',
        ext,
        kind,
        content,
        loadedAt:new Date().toISOString(),
      };
      addLog('success',`📥 Loaded local file: ${file.name} (${Math.round(file.size/1024)} KB)`);
    }catch(e){
      addLog('error',`Failed to load ${file.name}: ${e.message}`);
    }
  }
  addLog('info',`Local files ready for CSV / JSON / XML / Excel source blocks: ${Object.keys(ST.uploadedFiles).length}`);
}

// ── UNDO/REDO ────────────────────────────────────────────────────
var _undo_stack = [], _redo_stack = [];
function _snap(){return JSON.stringify(canvasToJSON());}
function _hist(){
  if(window._bulkLoading)return;
  _undo_stack.push(_snap());
  if(_undo_stack.length>60)_undo_stack.shift();
  _redo_stack=[];
  var u=$('btn-undo'),r=$('btn-redo');
  if(u){u.disabled=false;u.style.opacity='1';}
  if(r){r.disabled=true;r.style.opacity='0.35';}
}
function _doUndo(){
  if(!_undo_stack.length)return;
  _redo_stack.push(_snap());
  var prev=_undo_stack.pop();
  clearCanvas(); loadFromJSON(JSON.parse(prev));
  var u=$('btn-undo'),r=$('btn-redo');
  if(u){u.disabled=!_undo_stack.length;u.style.opacity=_undo_stack.length?'1':'0.35';}
  if(r){r.disabled=false;r.style.opacity='1';}
  addLog('info','↩ Undo');
}
function _doRedo(){
  if(!_redo_stack.length)return;
  _undo_stack.push(_snap());
  var next=_redo_stack.pop();
  clearCanvas(); loadFromJSON(JSON.parse(next));
  var u=$('btn-undo'),r=$('btn-redo');
  if(u){u.disabled=false;u.style.opacity='1';}
  if(r){r.disabled=!_redo_stack.length;r.style.opacity=_redo_stack.length?'1':'0.35';}
  addLog('info','↪ Redo');
}

async function _autosaveTabsToJobs(force){

window._ghSave=function(){
  var gh={remote:($('gh-remote')||{}).value||'',username:($('gh-user')||{}).value||'',email:($('gh-email')||{}).value||'',branch:($('gh-branch')||{}).value||'main'};
  try{localStorage.setItem('sk_gh',JSON.stringify(gh));}catch(e){}
  addLog('info','GitHub credentials saved');
};
window._ghRun=function(action){
  var gh={};try{gh=JSON.parse(localStorage.getItem('sk_gh')||'{}');}catch(e){}
  var out=$('gh-out');if(out){out.style.display='block';out.textContent='Running...';}
  var url,body={};
  if(action==='init'){url='/api/github/init';body={remote_url:gh.remote,username:gh.username,email:gh.email};}
  else if(action==='status'){url='/api/github/status';body={};}
  else if(action==='commit'){var msg=prompt('Commit message:','Sanskrit update');if(!msg)return;url='/api/github/commit';body={message:msg};}
  else if(action==='push'){url='/api/github/push';body={branch:gh.branch||'main',remote:'origin'};}
  else if(action==='pull'){url='/api/github/pull';body={branch:gh.branch||'main',remote:'origin'};}
  if(!url)return;
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){if(out)out.textContent=d.ok?(d.output||d.status||'OK'):('Error: '+(d.error||'failed'));addLog(d.ok?'success':'error','Git '+action+': '+(d.ok?(d.output||'OK'):(d.error||'')).slice(0,80));})
    .catch(function(e){if(out)out.textContent='Error: '+e.message;});
};
window._ghPullOpen=function(){

    // Look for a canvas.json or .sanskrit file in the repo root
    fetch('/api/github/load-canvas').then(function(r){return r.json();}).then(function(d){
      if(d.canvas){clearCanvas();loadFromJSON(d.canvas);setTimeout(fitView,200);addLog('success','Canvas loaded from git repo');}

    }).catch(function(){addLog('info','Pull done. Load .sanskrit file manually if needed.');});
  },2000);
};

function _getCircuit(){
  var blocks=[...ST.blocks.values()];
  var regs=blocks.filter(function(b){return b.type==='quantum_register';});
  var nq=regs.length?Math.max.apply(null,regs.map(function(b){return parseInt(b.params.n_qubits)||2;})):2;
  var shots=1000,gates=[];
  var inDeg=new Map();blocks.forEach(function(b){inDeg.set(b.id,0);});
  ST.wires.forEach(function(w){inDeg.set(w.tid,(inDeg.get(w.tid)||0)+1);});
  var q=[...inDeg.entries()].filter(function(e){return e[1]===0;}).map(function(e){return e[0];});
  var order=[];
  while(q.length){var cur=q.shift();order.push(cur);ST.wires.forEach(function(w){if(w.fid===cur){var n=(inDeg.get(w.tid)||1)-1;inDeg.set(w.tid,n);if(!n)q.push(w.tid);}});}
  blocks.forEach(function(b){if(!order.includes(b.id))order.push(b.id);});
  var gmap={h_gate:'H',x_gate:'X',y_gate:'Y',z_gate:'Z',s_gate:'S',t_gate:'T',rx_gate:'Rx',ry_gate:'Ry',rz_gate:'Rz',cnot_gate:'CNOT',cz_gate:'CZ',swap_gate:'SWAP',toffoli_gate:'CCX',measure_all:'MEAS'};
  order.forEach(function(id){
    var b=ST.blocks.get(id);if(!b||!gmap[b.type])return;
    var p=b.params;
    if(b.type==='measure_all'){shots=parseInt(p.shots)||1000;gates.push({t:'MEAS',nq:nq});return;}
    var g={t:gmap[b.type]};
    if(['h_gate','x_gate','y_gate','z_gate','s_gate','t_gate'].includes(b.type))g.q=[parseInt(p.qubit)||0];
    else if(['rx_gate','ry_gate','rz_gate'].includes(b.type)){g.q=[parseInt(p.qubit)||0];g.a=parseFloat(p.theta)||1.5708;}
    else if(b.type==='cnot_gate')g.q=[parseInt(p.control)||0,parseInt(p.target)||1];
    else if(b.type==='cz_gate')g.q=[parseInt(p.qubit_a)||0,parseInt(p.qubit_b)||1];
    else if(b.type==='swap_gate')g.q=[parseInt(p.qubit_a)||0,parseInt(p.qubit_b)||1];
    else if(b.type==='toffoli_gate')g.q=[parseInt(p.ctrl1)||0,parseInt(p.ctrl2)||1,parseInt(p.target)||2];
    gates.push(g);
  });
  return{nq:nq,shots:shots,gates:gates};
}

// ── PNG EXPORT (blocks only, high quality) ─────────────────────────
function exportPNG(){
  if(!ST.blocks.size){addLog('warn','Canvas is empty');return;}
  // Calculate bounding box of all blocks
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  ST.blocks.forEach(function(b){
    var r=b.el.getBoundingClientRect();
    var ca=$('canvas-area').getBoundingClientRect();
    var lx=(r.left-ca.left-ST.vx)/ST.vs, ly=(r.top-ca.top-ST.vy)/ST.vs;
    var rx=lx+r.width/ST.vs, ry=ly+r.height/ST.vs;
    minX=Math.min(minX,lx);minY=Math.min(minY,ly);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);
  });
  var pad=40;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  var W=maxX-minX, H=maxY-minY;
  var scale=2; // high DPI
  // Create offscreen canvas
  var cvs=document.createElement('canvas');
  cvs.width=Math.round(W*scale);cvs.height=Math.round(H*scale);
  var ctx=cvs.getContext('2d');
  // Background
  ctx.fillStyle='#0D1117';ctx.fillRect(0,0,cvs.width,cvs.height);
  // Draw grid dots
  ctx.fillStyle='rgba(48,54,61,0.5)';
  for(var gx=0;gx<W;gx+=24){for(var gy=0;gy<H;gy+=24){ctx.beginPath();ctx.arc((gx)*scale,(gy)*scale,1,0,Math.PI*2);ctx.fill();}}
  addLog('info','📸 Generating PNG ('+Math.round(W)+'×'+Math.round(H)+'px)...');
  // Use html2canvas on the cb div with clip
  var loadAndExport=function(){
    html2canvas($('cb'),{
      backgroundColor:'#0D1117',
      scale:scale,
      useCORS:true,
      logging:false,
      x:minX*ST.vs,y:minY*ST.vs,
      width:W*ST.vs,height:H*ST.vs,
      windowWidth:W*ST.vs,windowHeight:H*ST.vs,
    }).then(function(c){
      var a=document.createElement('a');
      a.href=c.toDataURL('image/png',1.0);
      a.download=(_curJobName||'canvas')+'.png';
      a.click();
      addLog('success','✓ PNG saved: '+Math.round(W*scale)+'×'+Math.round(H*scale)+'px');
    }).catch(function(e){addLog('error','PNG: '+e.message);});
  };
  if(window.html2canvas){loadAndExport();}
  else{var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';s.onload=loadAndExport;s.onerror=function(){addLog('error','html2canvas failed to load');};document.head.appendChild(s);}
}

  fetch('/api/metrics').then(function(r){return r.json();}).then(function(d){
    var curTotal=d.heap_total||256;
    var sysMB=d.sys_total_mb||4096;
    box.style.width='520px';
    box.innerHTML=
      '<div class="mh"><span class="mt">💾 Heap Memory Configuration</span><button class="mc" onclick="closeModal()">✕</button></div>'
      +'<div class="mbod">'
      +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px">'
      +'<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Current Node.js heap limit: <strong style="color:var(--accent)">'+curTotal+'MB</strong></div>'

      +'2. Run <code style="background:var(--bg4);padding:1px 5px;border-radius:3px">expand_heap.bat</code> (Windows) or <code style="background:var(--bg4);padding:1px 5px;border-radius:3px">./expand_heap.sh</code> (Mac/Linux)<br>'
      +'3. Select your preferred heap size<br>'

      +'</div>'

};
