// PORT GEOMETRY (mathematical - no DOM measurement needed)
// ══════════════════════════════════════════════════════
const BLOCK_W    = 210;
const HEADER_H   = 34;
const PARAM_H    = 20;
const PORT_H     = 24;
const FLAGS_H    = 30;
const PORTS_PAD  = 8;

function blockHeight(def) {
  const nParams = Math.min(3, (def.params||[]).length);
  const nPorts  = Math.max((def.ins||[]).length, (def.outs||[]).length);
  return HEADER_H + nParams * PARAM_H + 12 + nPorts * PORT_H + PORTS_PAD + FLAGS_H;
}

function portPos(block, portName, dir) {
  const def = BD[block.type]; if (!def) return {x:0,y:0};
  const ports = dir==='in' ? (def.ins||[]) : (def.outs||[]);
  const idx   = ports.findIndex(p => p.n === portName); if (idx < 0) return {x:0,y:0};
  const nParams = Math.min(3, (def.params||[]).length);
  const portsStartY = HEADER_H + nParams * PARAM_H + 12 + PORTS_PAD + idx * PORT_H + PORT_H/2;
  const bw = block.width || BLOCK_W;
  return {
    x: block.x + (dir==='out' ? bw : 0),
    y: block.y + portsStartY,
    type: ports[idx]?.t || 'any',
  };
}

// Wire path (canvas coordinates)
function wirePath(x1,y1,x2,y2,style='curved') {
  switch(style) {
    case 'straight': return `M ${x1} ${y1} L ${x2} ${y2}`;
    case 'stepped':  { const mx=(x1+x2)/2; return `M ${x1} ${y1} L ${mx} ${y1} L ${mx} ${y2} L ${x2} ${y2}`; }
    default:         { const cx=(x1+x2)/2; return `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`; }
  }
}

// CANVAS STATE
// ══════════════════════════════════════════════════════
let _nid = 1;
const gid = () => 'b' + (_nid++);
const wid = () => 'w' + (_nid++);

function mkBlock(type, x, y, id, params) {
  const def = BD[type]; if (!def) return null;
  const p = {};
  (def.params||[]).forEach(pm => p[pm.k] = params?.[pm.k] ?? pm.d);
  return { id: id||gid(), type, x, y, params: p, flags: {bypass:false,trycatch:false,printio:false}, width: BLOCK_W };
}

function mkCanvas() {
  return { blocks:[], wires:[], selected:null, selWire:null, vx:60, vy:60, vs:1 };
}

function canvasReducer(state, action) {
  switch(action.type) {
    case 'ADD_BLOCK': return {...state, blocks:[...state.blocks, action.block], selected: action.block.id, selWire:null};
    case 'UPDATE_BLOCK': return {...state, blocks: state.blocks.map(b => b.id===action.id ? {...b,...action.updates} : b)};
    case 'UPDATE_PARAM': return {...state, blocks: state.blocks.map(b => b.id===action.bid ? {...b, params:{...b.params,[action.k]:action.v}} : b)};
    case 'UPDATE_FLAG':  return {...state, blocks: state.blocks.map(b => b.id===action.bid ? {...b, flags:{...b.flags,[action.k]:action.v}} : b)};
    case 'DELETE_BLOCK': return {...state, blocks:state.blocks.filter(b=>b.id!==action.id), wires:state.wires.filter(w=>w.fid!==action.id&&w.tid!==action.id), selected:null, selWire:null};
    case 'ADD_WIRE': {
      const dup = state.wires.find(w=>w.fid===action.w.fid&&w.fp===action.w.fp&&w.tid===action.w.tid&&w.tp===action.w.tp);
      if(dup) return state;
      return {...state, wires:[...state.wires, action.w]};
    }
    case 'DELETE_WIRE': return {...state, wires:state.wires.filter(w=>w.id!==action.id), selWire:null};
    case 'SELECT': return {...state, selected:action.id||null, selWire:null};
    case 'SELECT_WIRE': return {...state, selWire:action.id, selected:null};
    case 'SET_VP': return {...state, vx:action.vx, vy:action.vy, vs:action.vs};
    case 'CLEAR': return mkCanvas();
    case 'LOAD': return action.canvas;
    default: return state;
  }
}

// Topological sort
function topoSort(blocks, wires) {
  const ids = blocks.map(b=>b.id);
  const inDeg = Object.fromEntries(ids.map(id=>[id,0]));
  wires.forEach(w=>{ if(inDeg[w.tid]!==undefined) inDeg[w.tid]++; });
  const q = ids.filter(id=>inDeg[id]===0);
  const order = [];
  while(q.length) {
    const cur=q.shift(); order.push(cur);
    wires.forEach(w=>{ if(w.fid===cur&&inDeg[w.tid]!==undefined){ inDeg[w.tid]--; if(!inDeg[w.tid])q.push(w.tid); }});
  }
  ids.forEach(id=>{ if(!order.includes(id)) order.push(id); });
  return order;
}

// Code generation
function getRegName(blocks, wires, bid) {
  for(const w of wires) {
    if(w.tid===bid && w.tp==='in') {
      const fb = blocks.find(b=>b.id===w.fid);
      if(fb?.type==='quantum_register') return fb.params.name||'q';
      const r = getRegName(blocks, wires, w.fid); if(r) return r;
    }
  }
  return null;
}
const CODE_MAP = {
  quantum_register: (p)=>`let ${p.name||'q'}=qubits(${p.n_qubits||2})`,
  h_gate:(p,r)=>`H(${r}[${p.qubit||0}])`, x_gate:(p,r)=>`X(${r}[${p.qubit||0}])`,
  y_gate:(p,r)=>`Y(${r}[${p.qubit||0}])`, z_gate:(p,r)=>`Z(${r}[${p.qubit||0}])`,
  s_gate:(p,r)=>`S(${r}[${p.qubit||0}])`, t_gate:(p,r)=>`T(${r}[${p.qubit||0}])`,
  rx_gate:(p,r)=>`Rx(${r}[${p.qubit||0}],${p.theta||1.5708})`,
  ry_gate:(p,r)=>`Ry(${r}[${p.qubit||0}],${p.theta||1.5708})`,
  rz_gate:(p,r)=>`Rz(${r}[${p.qubit||0}],${p.theta||1.5708})`,
  cnot_gate:(p,r)=>`CNOT(${r}[${p.control||0}],${r}[${p.target||1}])`,
  cz_gate:(p,r)=>`CZ(${r}[${p.qubit_a||0}],${r}[${p.qubit_b||1}])`,
  swap_gate:(p,r)=>`SWAP(${r}[${p.qubit_a||0}],${r}[${p.qubit_b||1}])`,
  toffoli_gate:(p,r)=>`Toffoli(${r}[${p.ctrl1||0}],${r}[${p.ctrl2||1}],${r}[${p.target||2}])`,
  measure_all:(p,r,id)=>`let r_${id}=measure_all(${r},shots=${p.shots||1000})\nprint(r_${id}.histogram)`,
  statevector_block:(p,r,id)=>`let sv_${id}=statevector(${r})\nprint(sv_${id})`,
  grover_block:(p,r,id)=>`let g_${id}=grover(${p.n_qubits||4},[${p.target||7}],${p.shots||1000})\nprint(g_${id}.histogram)`,
  vqe_block:(p,r,id)=>`molecule ${p.molecule||'H2'}{atoms:[H,H],bond_length:0.74,basis_set:"STO-3G"}\nlet v_${id}=vqe(${p.molecule||'H2'},ansatz="${p.ansatz||'UCCSD'}",shots=${p.shots||2000})\nprint(f"Energy: {v_${id}.energy:.6f} Ha")`,
  qft_block:(p,r)=>`${r}.qft(${r}.n_qubits,${p.inverse||false})`,
  shor_block:(p,r,id)=>`let sh_${id}=shor_factor(N=${p.N||15},a=${p.a||2},n_count_qubits=${p.n_count||8},shots=${p.shots||2000})\nprint(f"Factors: {sh_${id}.factors}")`,
  log_block:(p)=>`print("${(p.label||'').replace(/"/g,"'")}")`,
  print_block:(p)=>`print("${(p.label||'').replace(/"/g,"'")}")`,
};
function blocksToCode(blocks, wires) {
  const order = topoSort(blocks, wires);
  const lines = ['-- Sanskrit Visual Builder v3.3 — Generated DSL',''];
  order.forEach(bid => {
    const b = blocks.find(x=>x.id===bid); if(!b) return;
    const fn = CODE_MAP[b.type]; if(!fn) return;
    const reg = getRegName(blocks, wires, b.id)||b.params?.name||'q';
    const sid = b.id.replace('b','');
    try { const line=fn(b.params, reg, sid); if(line) lines.push(line); } catch(e){}
  });
  return lines.join('\n');
}
function hlDSL(code) {
  const kws=['let','def','if','elif','else','for','while','in','and','or','not','true','false','molecule'];
  const fns=['qubits','H','X','Y','Z','S','T','Rx','Ry','Rz','CNOT','CZ','SWAP','Toffoli','measure','measure_all','statevector','grover','vqe','print'];
  let h = code.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/(--[^\n]*)/g,'<span class="dc">$1</span>');
  h=h.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="ds">$1</span>');
  h=h.replace(/\b(\d+\.?\d*)\b/g,'<span class="dn">$1</span>');
  fns.forEach(f=>{h=h.replace(new RegExp('\\b('+f+')\\b','g'),'<span class="df">$1</span>');});
  kws.forEach(k=>{h=h.replace(new RegExp('\\b('+k+')\\b','g'),'<span class="dk">$1</span>');});
  return h;
}

// Auto-align
function autoAlignBlocks(blocks, wires) {
  const order = topoSort(blocks, wires);
  const depth = Object.fromEntries(blocks.map(b=>[b.id,0]));
  wires.forEach(w=>{const d=(depth[w.fid]||0)+1;if(d>(depth[w.tid]||0))depth[w.tid]=d;});
  const cols = {};
  blocks.forEach(b=>{const d=depth[b.id]||0;if(!cols[d])cols[d]=[];cols[d].push(b.id);});
  const sorted = Object.entries(cols).sort((a,b)=>+a[0]-+b[0]);
  let x=80;
  const result = {};
  sorted.forEach(([,ids])=>{
    ids.forEach((id,row)=>{ result[id]={x,y:80+row*190}; });
    x += 280;
  });
  return blocks.map(b=>result[b.id]?{...b,...result[b.id]}:b);
}

            <div key={catId}>

          <div className="pno-res">No blocks matching "<b>{query}</b>"</div>}
      </div>
    </div>
  );
}

        <div className="psec">

          {(blockDef.ins||[]).length>0 && (
            <>
              <div style={{fontSize:9,color:'var(--text3)',marginBottom:4,letterSpacing:.5}}>INPUTS</div>
              {(blockDef.ins||[]).map(p=>{
                const c=portColors[p.t]||'#6B7280';
                return <span key={p.n} className="pbadge" style={{background:`${c}22`,border:`1px solid ${c}55`,color:c}}>→ {p.n} <small style={{opacity:.6}}>{p.t}</small></span>;
              })}
            </>

          {(blockDef.outs||[]).length>0 && (
            <>
              <div style={{fontSize:9,color:'var(--text3)',margin:'6px 0 4px',letterSpacing:.5}}>OUTPUTS</div>
              {(blockDef.outs||[]).map(p=>{
                const c=portColors[p.t]||'#6B7280';
                return <span key={p.n} className="pbadge" style={{background:`${c}22`,border:`1px solid ${c}55`,color:c}}>← {p.n} <small style={{opacity:.6}}>{p.t}</small></span>;
              })}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// VISUAL BLOCK — Fixed drag via ref tracking
// ══════════════════════════════════════════════════════
function VBlock({ block, selected, dispatch, onPortMouseDown }) {
  const blockDef = BD[block.type]; if(!blockDef) return null;
  const visPars = (blockDef.params||[]).slice(0,3);
  const elRef = useRef(null);

  const handleHeaderMouseDown = (e) => {
    if(e.target.closest('.port-dot,.vb-flag,.vb-resize')) return;
    if(e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    dispatch({type:'SELECT', id:block.id});

    // Store drag info in global ref for canvas to consume
    const startX = e.clientX, startY = e.clientY;
    const bx0 = block.x, by0 = block.y;
    let lastDispatch = 0;

    const onMove = (ev) => {
      const now = Date.now();
      if(now - lastDispatch < 16) return; // throttle to ~60fps
      lastDispatch = now;
      window.__dragBlock = { id: block.id, dx: ev.clientX-startX, dy: ev.clientY-startY, bx0, by0 };
    };
    const onUp = () => {
      window.__dragBlock = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  const handleResizeMouseDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX, startW = block.width || 210;
    const onMove = (ev) => {
      const nw = Math.max(170, startW + (ev.clientX - startX));
      dispatch({type:'UPDATE_BLOCK', id:block.id, updates:{width:nw}});
    };
    const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  return (
    <div ref={elRef}
      className={`vblock${selected?' selected':''}${block.flags?.bypass?' bypassed':''}`}
      style={{left:block.x, top:block.y, width:block.width||210, position:'absolute', zIndex:selected?5:1}}
      data-bid={block.id}
      onMouseDown={handleHeaderMouseDown}>
      {/* Header */}
      <div className="vbh" style={{background:blockDef.col||'#374151'}}>
        <span className="vbi">{blockDef.icon||'◆'}</span>
        <span className="vbt">{blockDef.lbl}</span>
        <span className="vbc" style={{maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(CATS[blockDef.cat]||{}).lbl||''}</span>
      </div>
      {/* Param preview */}
      {visPars.length>0 && (
        <div className="vbb">
          {visPars.map(p=>(
            <div key={p.k} className="vbpr">
              <span className="vbpl">{p.l}:</span>
              <span className="vbpv">{String(block.params[p.k]??p.d??'').slice(0,22)}</span>
            </div>
          ))}
        </div>
      )}
      {/* Ports */}
      <div className="vbports">
        <div className="port-col">
          {(blockDef.ins||[]).map(p=>(
            <div key={p.n} className="port-row">
              <div className={`port-dot ${p.t||'any'}`}
                data-bid={block.id} data-port={p.n} data-dir="in"
                title={p.l||p.n}
                onMouseDown={e=>{e.preventDefault();e.stopPropagation();onPortMouseDown(e,block.id,p.n,'in');}}/>
              <span style={{fontSize:9,color:'var(--text3)'}}>{p.l||p.n}</span>
            </div>
          ))}
        </div>
        <div className="port-col" style={{alignItems:'flex-end'}}>
          {(blockDef.outs||[]).map(p=>(
            <div key={p.n} className="port-row out">
              <div className={`port-dot ${p.t||'any'}`}
                data-bid={block.id} data-port={p.n} data-dir="out"
                title={p.l||p.n}
                onMouseDown={e=>{e.preventDefault();e.stopPropagation();onPortMouseDown(e,block.id,p.n,'out');}}/>
              <span style={{fontSize:9,color:'var(--text3)'}}>{p.l||p.n}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Flags */}
      <div className="vbflags" onClick={e=>e.stopPropagation()}>
        {[['bypass','⚡ Bypass'],['trycatch','🛡 Try'],['printio','🖨 I/O']].map(([k,lbl])=>(
          <label key={k} className="vb-flag">
            <input type="checkbox" checked={!!block.flags?.[k]}
              onChange={e=>{ e.stopPropagation(); dispatch({type:'UPDATE_FLAG',bid:block.id,k,v:e.target.checked}); }}/>
            <span>{lbl}</span>
          </label>
        ))}
      </div>
      {/* Resize handle */}
      <div className="vb-resize" title="Drag to resize" onMouseDown={handleResizeMouseDown}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// WIRE LAYER — Fixed: pointer events so wires are clickable
// ══════════════════════════════════════════════════════
function WireLayer({ blocks, wires, selWire, onWireClick, draftWire, snapTarget, wireStyle }) {
  // NOTE: SVG does NOT have pointer-events:none — wires are clickable
  // Canvas panning is handled by the canvas-vp div's own mousedown (not SVG)
  return (
    <svg style={{position:'absolute',top:0,left:0,width:5000,height:4000,overflow:'visible',pointerEvents:'none'}}>
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#4B5563"/>
        </marker>
      </defs>
      {/* Wire hit-area (invisible wider stroke for easier clicking) */}
      {wires.map(w => {
        const fb = blocks.find(b=>b.id===w.fid);
        const tb = blocks.find(b=>b.id===w.tid);
        if(!fb||!tb) return null;
        const fp2 = portPos(fb, w.fp, 'out');
        const tp2 = portPos(tb, w.tp, 'in');
        const color = WIRE_COLORS[fp2.type||'any'] || '#6B7280';
        const d = wirePath(fp2.x,fp2.y,tp2.x,tp2.y,wireStyle);
        return (
          <g key={w.id} style={{pointerEvents:'all',cursor:'pointer'}} onClick={(e)=>{e.stopPropagation();onWireClick(w.id);}}>
            {/* Wide invisible hit area */}
            <path d={d} fill="none" stroke="transparent" strokeWidth="12"/>
            {/* Visible wire */}
            <path d={d} className={`wire-path${w.id===selWire?' selected':''}`}
              stroke={color} strokeWidth={w.id===selWire?4:2.5}
              fill="none" strokeLinecap="round"
              markerEnd="url(#arr)"
              style={{filter: w.id===selWire?`drop-shadow(0 0 4px ${color})`:'none'}}/>
          </g>
        );
      })}
      {/* Draft wire while drawing */}
      {draftWire && (
        <path d={wirePath(draftWire.x1,draftWire.y1,draftWire.x2,draftWire.y2,wireStyle)}
          fill="none" stroke="#58A6FF" strokeWidth="2"
          strokeDasharray="6,3" style={{pointerEvents:'none'}}/>
      )}
      {/* Snap ring */}
      {snapTarget && (
        <circle cx={snapTarget.x} cy={snapTarget.y} r={14}
          fill="none" stroke="#58A6FF" strokeWidth="2"
          strokeDasharray="4,2" style={{pointerEvents:'none'}}/>
      )}
    </svg>
  );
}

// ══════════════════════════════════════════════════════
// CANVAS — Fixed: pan logic, wire selection, block drag
// ══════════════════════════════════════════════════════
function Canvas({ cs, dispatch, running, wireStyle }) {
  const vpRef      = useRef(null);
  const panRef     = useRef(null);
  const drawRef    = useRef(null);   // current wire-drawing state
  const csRef      = useRef(cs);     // always current cs
  csRef.current = cs;

  const [draftWire, setDraftWire] = useState(null);
  const [snapTarget, setSnapTarget] = useState(null);

  const SNAP_R = 52;

  // Find nearest in-port within SNAP_R (in canvas coords)
  const findSnap = useCallback((cx, cy, excludeId) => {
    let best=null, bestD=SNAP_R;
    csRef.current.blocks.forEach(b => {
      if(b.id===excludeId) return;
      const def2 = BD[b.type]; if(!def2) return;
      (def2.ins||[]).forEach(p => {
        const pos = portPos(b, p.n, 'in');
        const d = Math.hypot(cx - pos.x, cy - pos.y);
        if(d < bestD) { bestD=d; best={bid:b.id, port:p.n, x:pos.x, y:pos.y, type:p.t||'any'}; }
      });
    });
    return best;
  }, []); // stable — reads from csRef

  const getCanvasXY = (clientX, clientY) => {
    const r = vpRef.current.getBoundingClientRect();
    const {vx,vy,vs} = csRef.current;
    return { x: (clientX - r.left - vx) / vs, y: (clientY - r.top  - vy) / vs };
  };

  // Non-passive wheel zoom
  useEffect(() => {
    const el = vpRef.current; if(!el) return;
    const onWheel = (e) => {
      e.preventDefault();
      const r = el.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const {vx,vy,vs} = csRef.current;
      const f = e.deltaY < 0 ? 1.12 : 0.88;
      const nvs = Math.min(2.5, Math.max(0.12, vs * f));
      dispatch({type:'SET_VP', vx: mx-(mx-vx)*(nvs/vs), vy: my-(my-vy)*(nvs/vs), vs: nvs});
    };
    el.addEventListener('wheel', onWheel, {passive:false});
    return () => el.removeEventListener('wheel', onWheel);
  }, []); // stable

  // Port mousedown — start wire drawing
  const onPortMouseDown = useCallback((e, bid, portName, dir) => {
    if(dir !== 'out') return;
    const b = csRef.current.blocks.find(x=>x.id===bid); if(!b) return;
    const fp2 = portPos(b, portName, 'out');
    drawRef.current = {fid:bid, fp:portName, x:fp2.x, y:fp2.y};
    setDraftWire({x1:fp2.x, y1:fp2.y, x2:fp2.x, y2:fp2.y});
  }, []);

  // Document-level mouse handlers (for drag + wire drawing)
  useEffect(() => {
    const onMove = (e) => {
      // Block drag
      if(window.__dragBlock) {
        const {id, dx, dy, bx0, by0} = window.__dragBlock;
        const {vs} = csRef.current;
        const nx = snap(bx0 + dx/vs);
        const ny = snap(by0 + dy/vs);
        dispatch({type:'UPDATE_BLOCK', id, updates:{x:nx, y:ny}});
        return;
      }
      // Wire drawing
      if(drawRef.current) {
        const vp = vpRef.current; if(!vp) return;
        const r = vp.getBoundingClientRect();
        const {vx,vy,vs} = csRef.current;
        const cx = (e.clientX - r.left - vx) / vs;
        const cy = (e.clientY - r.top  - vy) / vs;
        const sn = findSnap(cx, cy, drawRef.current.fid);
        const ex = sn ? sn.x : cx, ey = sn ? sn.y : cy;
        setDraftWire(d => d ? {...d, x2:ex, y2:ey} : d);
        setSnapTarget(sn ? {x:sn.x, y:sn.y} : null);
      }
    };
    const onUp = (e) => {
      // Finish wire
      if(drawRef.current) {
        const vp = vpRef.current;
        if(vp) {
          const r = vp.getBoundingClientRect();
          const {vx,vy,vs} = csRef.current;
          const cx = (e.clientX - r.left - vx) / vs;
          const cy = (e.clientY - r.top  - vy) / vs;
          const sn = findSnap(cx, cy, drawRef.current.fid);
          if(sn) {
            dispatch({type:'ADD_WIRE', w:{id:wid(), fid:drawRef.current.fid, fp:drawRef.current.fp, tid:sn.bid, tp:sn.port}});
          }
        }
        drawRef.current = null;
        setDraftWire(null);
        setSnapTarget(null);
      }
      // Stop pan
      panRef.current = null;
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    };
  }, [dispatch, findSnap]);

  // Viewport mousedown — pan or deselect
  const onVpMouseDown = (e) => {
    // Middle or right click = always pan
    if(e.button === 1 || e.button === 2) {
      e.preventDefault();
      panRef.current = {mx:e.clientX, my:e.clientY, vx:cs.vx, vy:cs.vy};
      return;
    }
    if(e.button !== 0) return;
    // Left click on empty canvas (not on a block or port)
    const onBlock = e.target.closest('[data-bid]');
    const onPort  = e.target.closest('.port-dot');
    if(!onBlock && !onPort) {
      dispatch({type:'SELECT', id:null});
      panRef.current = {mx:e.clientX, my:e.clientY, vx:cs.vx, vy:cs.vy};
    }
  };

  const onVpMouseMove = (e) => {
    if(panRef.current) {
      const dx = e.clientX - panRef.current.mx;
      const dy = e.clientY - panRef.current.my;
      dispatch({type:'SET_VP', vx:panRef.current.vx+dx, vy:panRef.current.vy+dy, vs:cs.vs});
    }
  };

  const onVpMouseUp = () => { panRef.current = null; };

  const onContextMenu = (e) => e.preventDefault();

  const onDrop = (e) => {
    e.preventDefault();
    try {
      const d = JSON.parse(e.dataTransfer.getData('text/plain'));
      if(d.type!=='block') return;
      const pos = getCanvasXY(e.clientX, e.clientY);
      const block = mkBlock(d.bid, snap(pos.x), snap(pos.y));
      if(block) dispatch({type:'ADD_BLOCK', block});
    } catch(ex){}
  };

  const onDblClick = (e) => {
    if(!e.target.closest('[data-bid]')) {
      dispatch({type:'SET_VP', vx:60, vy:60, vs:1});
    }
  };

  const handleWireClick = useCallback((wid2) => {
    dispatch({type:'SELECT_WIRE', id:wid2});
  }, [dispatch]);

  const fitView = () => {
    const cs2 = csRef.current;
    if(!cs2.blocks.length){dispatch({type:'SET_VP',vx:60,vy:60,vs:1});return;}
    let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
    cs2.blocks.forEach(b=>{mnx=Math.min(mnx,b.x);mny=Math.min(mny,b.y);mxx=Math.max(mxx,b.x+(b.width||210)+10);mxy=Math.max(mxy,b.y+200);});
    const r=vpRef.current?.getBoundingClientRect()||{width:800,height:600};
    const pad=60;
    const nvs=Math.min(1.4,Math.min((r.width-pad*2)/(mxx-mnx||1),(r.height-pad*2)/(mxy-mny||1)));
    dispatch({type:'SET_VP',vx:-mnx*nvs+pad,vy:-mny*nvs+pad,vs:nvs});
  };

  return (
    <div ref={vpRef} className="canvas-vp"
      onMouseDown={onVpMouseDown}
      onMouseMove={onVpMouseMove}
      onMouseUp={onVpMouseUp}
      onContextMenu={onContextMenu}
      onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';}}
      onDrop={onDrop}
      onDoubleClick={onDblClick}>

      {/* CANVAS INNER — only this element is transformed; sidebars are outside */}
      <div className="canvas-inner"
        style={{transform:`translate(${cs.vx}px,${cs.vy}px) scale(${cs.vs})`, transformOrigin:'0 0'}}>

        {/* Wire SVG first (behind blocks) */}
        <WireLayer
          blocks={cs.blocks} wires={cs.wires} selWire={cs.selWire}
          onWireClick={handleWireClick}
          draftWire={draftWire} snapTarget={snapTarget}
          wireStyle={wireStyle}/>

        {/* Blocks on top */}
        {cs.blocks.map(b => (
          <VBlock key={b.id} block={b}
            selected={b.id===cs.selected}
            dispatch={dispatch}
            onPortMouseDown={onPortMouseDown}/>
        ))}
      </div>

      {/* Empty canvas hint (outside transform) */}
      {cs.blocks.length===0 && (
        <div className="canvas-hint">
          <div style={{fontSize:48,marginBottom:10}}>⟨ψ⟩</div>
          <h2>Sanskrit Visual Builder v3.3</h2>
          <p>Drag blocks from the Library (left panel)<br/>
          Connect ports · Click ▶ Run to execute<br/>
          Right-click / middle-click to pan · Scroll to zoom<br/>
          Click <b>Examples</b> to load pre-built programs</p>
        </div>
      )}
      {running && (
        <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',background:'var(--accent2)',color:'#fff',padding:'4px 16px',borderRadius:20,fontSize:12,fontWeight:600,zIndex:20,animation:'pulse .8s infinite'}}>
          ⟨ψ⟩ Executing...
        </div>
      )}
      {/* Wire selection hint */}
      {cs.selWire && (
        <div style={{position:'absolute',bottom:52,left:'50%',transform:'translateX(-50%)',background:'var(--bg2)',border:'1px solid var(--orange)',borderRadius:8,padding:'4px 14px',fontSize:11,color:'var(--orange)',zIndex:10}}>
          Wire selected — press DEL to delete
        </div>
      )}
      {/* Zoom controls */}
      <div className="czoom">
        <button className="cz-btn" title="Fit to view" onClick={fitView}>⊙</button>
        <button className="cz-btn" onClick={()=>dispatch({type:'SET_VP',vx:cs.vx,vy:cs.vy,vs:Math.min(2.5,cs.vs*1.2)})}>+</button>
        <button className="cz-btn" onClick={()=>dispatch({type:'SET_VP',vx:cs.vx,vy:cs.vy,vs:Math.max(0.12,cs.vs*0.8)})}>−</button>
        <button className="cz-btn" style={{width:36,fontSize:10}} onClick={()=>dispatch({type:'SET_VP',vx:60,vy:60,vs:1})}>{Math.round(cs.vs*100)}%</button>
      </div>
    </div>
  );
}

function OutputConsole({ logs, charts, tableData, dslCode, activeTab, setActiveTab, onClear, onDlTable }) {
  const linesRef = useRef(null);
  const [tblFilter, setTblFilter] = useState('');

  useEffect(()=>{ if(linesRef.current) linesRef.current.scrollTop=linesRef.current.scrollHeight; },[logs]);

  // Chart rendering
  const chartRefs = useRef({});
  const chartInstances = useRef({});
  useEffect(()=>{
    charts.forEach(c=>{
      const canvas = chartRefs.current[c.id];
      if(!canvas) return;
      if(chartInstances.current[c.id]) { try{chartInstances.current[c.id].destroy();}catch(e){} }
      if(c.type==='bar'||c.type==='histogram') {
        const labels=Object.keys(c.data).sort(), vals=labels.map(k=>Number(c.data[k])||0);
        const PAL=['rgba(88,166,255,.8)','rgba(188,140,255,.8)','rgba(63,185,80,.8)','rgba(210,153,34,.8)','rgba(248,81,73,.8)'];
        const bgMap={blue:PAL[0],purple:PAL[1],green:PAL[2],orange:PAL[3],red:PAL[4]};
        chartInstances.current[c.id]=new Chart(canvas,{type:'bar',data:{labels,datasets:[{label:'Count',data:vals,backgroundColor:bgMap[c.color]||PAL[0]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'var(--text2)',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'var(--text2)',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}}}},});
      } else if(c.type==='pie') {
        const labels=Object.keys(c.data).sort(),vals=labels.map(k=>Number(c.data[k])||0);
        const PAL=['rgba(88,166,255,.8)','rgba(188,140,255,.8)','rgba(63,185,80,.8)','rgba(210,153,34,.8)','rgba(248,81,73,.8)','rgba(57,211,83,.8)'];
        chartInstances.current[c.id]=new Chart(canvas,{type:'pie',data:{labels,datasets:[{data:vals,backgroundColor:labels.map((_,i)=>PAL[i%PAL.length])}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'var(--text2)',font:{size:10}}}}}});
      } else if(c.type==='scatter') {
        chartInstances.current[c.id]=new Chart(canvas,{type:'scatter',data:{datasets:[{label:c.title,data:c.data,backgroundColor:'rgba(88,166,255,.6)',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'var(--text2)'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'var(--text2)'},grid:{color:'rgba(255,255,255,.05)'}}}}});
      } else if(c.type==='line') {
        chartInstances.current[c.id]=new Chart(canvas,{type:'line',data:{labels:c.labels,datasets:[{label:c.yCol||'',data:c.data,borderColor:'rgba(88,166,255,.8)',backgroundColor:'rgba(88,166,255,.1)',tension:.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'var(--text2)'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'var(--text2)'},grid:{color:'rgba(255,255,255,.05)'}}}}});
      }
    });
    return ()=>{ Object.values(chartInstances.current).forEach(c=>{try{c.destroy();}catch(e){}}); chartInstances.current={}; };
  },[charts]);

  const tabs = ['Console','Charts','Tables','DSL Code','Profile'];
  const COLORS = {print:'var(--text)',gate:'var(--cyan)',measure:'var(--green)',error:'var(--red)',exception:'#FF9800',warn:'var(--orange)',success:'var(--green)',timing:'var(--orange)',debug:'var(--text3)',info:'var(--text2)',etl:'#22D3EE',dsl:'var(--purple)',answer:'#66BB6A'};
  const LABELS = {print:'▸ Answer',gate:'⚛ Gate',measure:'📏 Measure',error:'✗ Error',exception:'🛡 Exception',warn:'⚠ Warning',success:'✓ Done',timing:'⏱ Time',debug:'⌙ Debug',info:'·',etl:'⇒ ETL',dsl:'≡ Code',answer:'● Output'};

  const filteredRows = tableData ? (tblFilter ? tableData.rows.filter(r=>tableData.columns.some(c=>String(r[c]||'').toLowerCase().includes(tblFilter.toLowerCase()))) : tableData.rows) : [];

  return (
    <div className="output-panel">
      <div className="out-tabs">
        {tabs.map(t=><div key={t} className={`out-tab${activeTab===t?' active':''}`} onClick={()=>setActiveTab(t)}>{t}</div>)}
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,padding:'0 8px'}}>
          <button onClick={onClear} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:10,padding:'2px 8px',borderRadius:4,cursor:'pointer'}}>Clear</button>
        </div>
      </div>
      {/* Console */}
      <div className={`opane${activeTab==='Console'?' active':''}`}>
        <div id="con-lines" ref={linesRef}>
          {logs.map((l,i)=>(
            <div key={i} className="cline" style={{color:COLORS[l.type]||'var(--text2)'}}>
              <span className="cts">{l.ts}</span>
              {LABELS[l.type]&&<span style={{fontSize:9,color:'var(--text3)',marginRight:3}}>[{LABELS[l.type]}]</span>}
              {l.text}
            </div>
          ))}
        </div>
      </div>
      {/* Charts */}
      <div className={`opane${activeTab==='Charts'?' active':''}`}>
        <div style={{flex:1,overflowY:'auto',padding:10,display:'flex',flexWrap:'wrap',gap:10,alignContent:'flex-start'}}>
          {charts.length===0&&<div style={{padding:20,color:'var(--text3)',fontSize:12}}>Run a pipeline with chart blocks to see visualizations here</div>}
          {charts.map(c=>(
            <div key={c.id} className="cc">
              <div className="cct">{c.title}</div>
              <div className="ccw">
                {(c.type==='bar'||c.type==='histogram'||c.type==='pie'||c.type==='scatter'||c.type==='line') && <canvas ref={el=>chartRefs.current[c.id]=el}/>}
                {c.type==='statevector' && <div style={{overflow:'auto',maxHeight:160}}>
                  <table style={{width:'100%',fontSize:10}}><thead><tr style={{color:'var(--text3)'}}><th style={{textAlign:'left',padding:'2px 4px'}}>State</th><th>Re</th><th>Im</th><th>Prob</th></tr></thead>
                  <tbody>{(c.data||[]).filter(s=>s.prob>.001).map(s=><tr key={s.state}><td style={{color:'var(--accent)',fontFamily:'var(--mono)',padding:'2px 4px'}}>|{s.state}⟩</td><td style={{textAlign:'center'}}>{(s.re||0).toFixed(3)}</td><td style={{textAlign:'center',color:'var(--purple)'}}>{(s.im||0).toFixed(3)}i</td><td style={{textAlign:'center'}}>{Math.round(s.prob*100)}%</td></tr>)}</tbody></table>
                </div>}
                {c.type==='gauge' && <div style={{padding:'8px 4px',textAlign:'center'}}>
                  <div style={{fontSize:24,fontWeight:700,color:'var(--accent)',fontFamily:'var(--mono)'}}>{typeof c.value==='number'?c.value.toFixed(6):c.value}</div>
                  <div style={{position:'relative',height:10,background:'var(--bg4)',borderRadius:5,margin:'8px 4px'}}>
                    <div style={{height:'100%',width:`${Math.min(100,Math.max(0,(c.value-c.min)/(c.max-c.min)*100))}%`,background:'linear-gradient(90deg,var(--green),var(--accent))',borderRadius:5}}/>
                    <div style={{position:'absolute',top:-2,left:`${Math.min(100,Math.max(0,(c.target-c.min)/(c.max-c.min)*100))}%`,width:2,height:14,background:'var(--red)'}}/>
                  </div>
                  <div style={{fontSize:10,color:Math.abs(c.value-c.target)*1000<1?'var(--green)':'var(--orange)'}}>Target: {c.target} · Error: {(Math.abs(c.value-c.target)*1000).toFixed(3)} mHa</div>
                </div>}
              </div>
            </div>
          ))}
        </div>
      </div>
      {/* Tables */}
      <div className={`opane${activeTab==='Tables'?' active':''}`}>
        {tableData ? (
          <>
            <div className="tbtb">
              <input className="tbs" placeholder="🔍 Filter..." value={tblFilter} onChange={e=>setTblFilter(e.target.value)}/>
              <button onClick={onDlTable} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:10,padding:'2px 8px',borderRadius:4,cursor:'pointer'}}>⬇ CSV</button>
              <span className="tbi">{filteredRows.length} of {tableData.rows.length} rows × {tableData.columns.length} cols</span>
            </div>
            <div style={{overflow:'auto',flex:1}}>
              <table className="dtbl">
                <thead><tr>{tableData.columns.map(c=><th key={c}>{c}</th>)}</tr></thead>
                <tbody>{filteredRows.slice(0,50).map((row,i)=>(
                  <tr key={i}>{tableData.columns.map(c=>{
                    const v=row[c]; const isNull=v===''||v==null; const isNum=!isNull&&!isNaN(parseFloat(v));
                    return <td key={c} className={isNull?'nullc':isNum?'ncell':''}>{isNull?'∅':fmt(v)}</td>;
                  })}</tr>
                ))}</tbody>
              </table>
              {filteredRows.length>50&&<div style={{padding:'4px 10px',fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>Showing 50 of {filteredRows.length} rows</div>}
            </div>
          </>
        ) : <div style={{padding:16,color:'var(--text3)',fontSize:12}}>Run ETL blocks with a Table Display block to see data here</div>}
      </div>
      {/* DSL */}
      <div className={`opane${activeTab==='DSL Code'?' active':''}`}>
        {dslCode ? <pre id="dsl-pre" dangerouslySetInnerHTML={{__html:hlDSL(dslCode)}}/>
          : <div style={{padding:12,color:'var(--text3)',fontSize:12,fontFamily:'var(--mono)'}}>Press Compile to see generated DSL code from your visual blocks</div>}
      </div>
      {/* Profile */}
      <div className={`opane${activeTab==='Profile'?' active':''}`}>
        <div style={{padding:8,flex:1,overflow:'auto'}}>
          {tableData?.profile ? (
            <table className="dtbl">
              <thead><tr><th>Column</th><th>Type</th><th>Nulls</th><th>Null%</th><th>Distinct</th><th>Min</th><th>Mean</th><th>Max</th><th>Std</th></tr></thead>
              <tbody>{Object.entries(tableData.profile.stats||{}).map(([col,s])=>(
                <tr key={col}><td style={{color:'var(--accent)',fontFamily:'var(--mono)'}}>{col}</td><td style={{color:'var(--text3)'}}>{s.type||'?'}</td><td className={(s.null_pct||0)>30?'cerror':(s.null_pct||0)>10?'cwarn':''}>{s.null_count}</td><td>{s.null_pct||0}%</td><td>{s.distinct}</td><td className="ncell">{s.min!==undefined?fmt(s.min):''}</td><td className="ncell">{s.mean!==undefined?fmt(s.mean):''}</td><td className="ncell">{s.max!==undefined?fmt(s.max):''}</td><td className="ncell">{s.std!==undefined?fmt(s.std):''}</td>
                </tr>
              ))}</tbody>
            </table>
          ) : <div style={{color:'var(--text3)',fontSize:12}}>Connect a Profile Display block and Run to see column statistics</div>}
        </div>
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════
// MAIN APP COMPONENT
// ══════════════════════════════════════════════════════
function App() {
  // ── TABS (multiple canvases) ──────────────────────────────────
  const [tabs, setTabs] = useState([
    {id:'t1', title:'Canvas 1', cs: loadDefaultCanvas()}
  ]);
  const [activeTabId, setActiveTabId] = useState('t1');
  const tabsRef = useRef(tabs);
  tabsRef.current = tabs;

  const getActiveTab = () => tabs.find(t=>t.id===activeTabId);
  const getActiveCS  = () => getActiveTab()?.cs || mkCanvas();

  const dispatch = useCallback((action) => {
    setTabs(prev => prev.map(t =>
      t.id===activeTabId ? {...t, cs: canvasReducer(t.cs, action)} : t
    ));
  }, [activeTabId]);

  const addTab = () => {
    const id = 't'+(Date.now());
    const newTab = {id, title:'Canvas '+(tabs.length+1), cs: mkCanvas()};
    setTabs(t=>[...t,newTab]); setActiveTabId(id);
  };
  const closeTab = (tid) => {
    if(tabs.length===1) return;
    const newTabs = tabs.filter(t=>t.id!==tid);
    setTabs(newTabs);
    if(activeTabId===tid) setActiveTabId(newTabs[newTabs.length-1].id);
  };
  const renameTab = (tid, title) => setTabs(t=>t.map(t2=>t2.id===tid?{...t2,title}:t2));

  // ── GLOBAL OUTPUT STATE ───────────────────────────────────────
  const [logs, setLogs] = useState([
    {type:'info',text:'⟨ψ⟩ Sanskrit Visual Builder v3.3 — React Edition',ts:'00:00:00'},
    {type:'info',text:'📦 ETL + Data Science + Quantum — no npm install needed',ts:'00:00:00'},
    {type:'info',text:'💡 The canvas has a sample Bell State + ETL pipeline loaded',ts:'00:00:00'},
    {type:'info',text:'▶ Click RUN to execute both sections!',ts:'00:00:00'},
  ]);
  const [charts, setCharts] = useState([]);
  const [tableData, setTableData] = useState(null);
  const [dslCode, setDslCode] = useState('');
  const [outTab, setOutTab] = useState('Console');
  const [running, setRunning] = useState(false);
  const [extraBlocks, setExtraBlocks] = useState({});
  const [settings, setSettings] = useState({theme:'',tablePageSize:25,wireStyle:'curved',snapToGrid:true,autoSave:true});
  const [modal, setModal] = useState(null); // 'examples' | 'settings' | null
  const [metrics, setMetrics] = useState({cpu:0,heap_mb:0,heap_total:100,sys_pct:0,uptime:0});
  const [exCatFilter, setExCatFilter] = useState('');

  const addLog = useCallback((type, text) => {
    const ts = new Date().toTimeString().slice(0,8);
    setLogs(l=>[...l.slice(-500), {type,text:String(text||''),ts}]);
  },[]);

  // ── SERVER BLOCKS ─────────────────────────────────────────────
  useEffect(()=>{
    fetch('/api/blocks').then(r=>r.json()).then(({blocks,categories})=>{
      const eb = {};
      if(categories) {
        Object.entries(categories).forEach(([k,v])=>{
          CATS['srv_'+k]={id:'srv_'+k,lbl:v.label||k,col:v.color||'#374151'};
        });
      }
      (blocks||[]).forEach(b=>{
        if(!b.id||BD[b.id]) return;
        const params=(b.params||[]).filter(p=>!['bypass','code_override'].includes(p.key||'')).map(p=>({k:p.key||p.name||'v',l:p.label||p.key||'',t:({number:'number',angle:'number',bool:'select',select:'select',code:'area',json:'area'})[p.type]||'text',d:p.value!==undefined?p.value:(p.default??''),min:p.min,max:p.max,opts:p.options||null}));
        const ins=(b.inputs||[]).filter(p=>(p.dir||'in')==='in').map(p=>({n:p.id||p.name||'in',t:p.dt||p.type||'any',l:p.label||p.id||'in'}));
        const outs=(b.outputs||[]).map(p=>({n:p.id||p.name||'out',t:p.dt||p.type||'any',l:p.label||p.id||'out'}));
        eb[b.id]={id:b.id,lbl:b.label,cat:'srv_'+(b.cat||'utility'),col:b.color||'#374151',icon:b.icon||'◆',desc:typeof b.info==='string'?b.info:'',params,ins,outs};
      });
      setExtraBlocks(eb);
      addLog('success',`✓ Loaded ${Object.keys(eb).length} quantum blocks from registry (${Object.keys(BD).length+Object.keys(eb).length} total)`);
    }).catch(e=>addLog('warn','Server blocks: '+e.message));
  },[]);

  // ── SSE METRICS ───────────────────────────────────────────────
  useEffect(()=>{
    const sse = new EventSource('/api/events');
    sse.addEventListener('metrics',e=>{try{setMetrics(JSON.parse(e.data));}catch(ex){}});
    sse.addEventListener('run_line',e=>{try{const d=JSON.parse(e.data);addLog(d.type||'print',d.text||d.m||'');}catch(ex){}});
    return ()=>sse.close();
  },[]);
  useEffect(()=>{const id=setInterval(()=>fetch('/api/metrics').then(r=>r.json()).then(setMetrics).catch(()=>{}),5000);return()=>clearInterval(id);},[]);

  // ── KEYBOARD SHORTCUTS ────────────────────────────────────────
  // Keep a ref to current active cs for keyboard handler (avoids stale closure)
  const activeCsRef = useRef(null);
  useEffect(()=>{ activeCsRef.current = getActiveCS(); });

  useEffect(()=>{
    const onKey = (e) => {
      const tag = document.activeElement?.tagName||'';
      if(['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
      const curCs = activeCsRef.current || getActiveCS();
      if(e.key==='Delete'||e.key==='Backspace') {
        if(curCs.selWire) dispatch({type:'DELETE_WIRE',id:curCs.selWire});
        else if(curCs.selected) dispatch({type:'DELETE_BLOCK',id:curCs.selected});
        return;
      }
      if(e.key==='Escape'){dispatch({type:'SELECT',id:null});return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runProgram();return;}
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='B'){e.preventDefault();compileBlocks();return;}
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='A'){e.preventDefault();handleAutoAlign();return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCanvas();return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();if(confirm('New canvas?'))dispatch({type:'CLEAR'});}
    };
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  },[]); // stable — uses refs

  // ── ACTIONS ───────────────────────────────────────────────────
  const handleAutoAlign = () => {
    const cs = getActiveCS();
    const aligned = autoAlignBlocks(cs.blocks, cs.wires);
    setTabs(prev=>prev.map(t=>t.id===activeTabId?{...t,cs:{...t.cs,blocks:aligned}}:t));
    addLog('success','⊞ Auto-aligned '+cs.blocks.length+' blocks');
  };

  const saveCanvas = () => {
    const cs = getActiveCS();
    const d = canvasToJSON(cs, getActiveTab()?.title||'Canvas');
    const blob = new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const a = document.createElement('a');a.href=URL.createObjectURL(blob);a.download='canvas.sanskrit';a.click();
    addLog('info','💾 Saved as canvas.sanskrit');
  };

  const loadFile = (file) => {
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        const cs = jsonToCanvas(d);
        setTabs(prev=>prev.map(t=>t.id===activeTabId?{...t,cs,title:d.title||t.title}:t));
        addLog('info','Loaded: '+(d.title||'Canvas')+' ('+cs.blocks.length+' blocks)');
      } catch(ex){ addLog('error','Load failed: '+ex.message); }
    };
    r.readAsText(file);
  };

  const loadExample = (ex) => {
    const cs = jsonToCanvas(ex);
    setModal(null);
    // Load into current or new tab
    setTabs(prev=>prev.map(t=>t.id===activeTabId?{...t,cs,title:ex.title}:t));
    clearOutput();
    addLog('info','📋 Loaded: '+ex.title);
    addLog('info','▶ Click Run to execute this example!');
  };

  const clearOutput = () => { setCharts([]); setTableData(null); setDslCode(''); };

  // ── COMPILE ───────────────────────────────────────────────────
  const compileBlocks = async () => {
    const cs = getActiveCS();
    const code = blocksToCode(cs.blocks, cs.wires);
    setDslCode(code);
    setOutTab('DSL Code');
    addLog('dsl','--- Generated DSL ('+cs.blocks.length+' blocks, '+cs.wires.length+' connections) ---');
    // Validate quantum code
    const hasQ = cs.blocks.some(b=>['q_reg','q_gate','q_meas','q_algo'].includes(b.def?.cat||BD[b.type]?.cat));
    if(hasQ && code.trim()) {
      try {
        const res = await fetch('/api/compile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
        const d = await res.json();
        addLog(d.success?'success':'error','🔨 '+d.summary);
      } catch(e){}
    } else {
      addLog('success','✓ ETL/DS pipeline compiled — '+cs.blocks.length+' blocks');
    }
  };

  // ── RUN ───────────────────────────────────────────────────────
  const runProgram = async () => {
    if(running) return;
    const cs = getActiveCS();
    if(!cs.blocks.length){addLog('warn','Canvas is empty');return;}
    clearOutput(); setRunning(true);
    addLog('info','⟨ψ⟩ Starting execution...');
    // Log to server
    try{await fetch('/api/log/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({blocks:cs.blocks.length,wires:cs.wires.length})});}catch(e){}
    // DSL code
    const code = blocksToCode(cs.blocks, cs.wires);
    setDslCode(code);
    // Determine what to run
    const hasETL = cs.blocks.some(b=>{ const cat=BD[b.type]?.cat||''; return cat.startsWith('etl')||cat==='ds'; });
    const hasQ   = cs.blocks.some(b=>{ const cat=BD[b.type]?.cat||''; return ['q_reg','q_gate','q_meas','q_algo'].includes(cat); });
    if(hasETL) await runETL(cs);
    if(hasQ)   await runQuantum(code, cs);
    setRunning(false);
    addLog('success','✓ Execution complete');
  };

  const stopProgram = () => { setRunning(false); addLog('warn','■ Stopped by user'); };

  // ── ETL EXECUTION ─────────────────────────────────────────────
  const runETL = async (cs) => {
    const order = topoSort(cs.blocks, cs.wires);
    const outputs = new Map();

    for(const bid of order) {
      const b = cs.blocks.find(x=>x.id===bid); if(!b) continue;
      const cat = BD[b.type]?.cat||'';
      if(!cat.startsWith('etl')&&cat!=='ds') continue;
      if(BD[b.type]?.isViz||cat==='out') continue;

      if(b.flags?.bypass) {
        addLog('warn','⚡ Bypassed: '+(BD[b.type]?.lbl||b.type));
        const inp={};cs.wires.forEach(w=>{if(w.tid===bid){const up=outputs.get(w.fid);if(up&&up[w.fp])inp[w.fp]=up[w.fp];}});
        const out={};if(inp.dataset)out.dataset=inp.dataset;outputs.set(bid,out);continue;
      }
      // Collect inputs
      const inputs={};cs.wires.forEach(w=>{if(w.tid===bid){const up=outputs.get(w.fid);if(up&&up[w.fp]!==undefined)inputs[w.tp]=up[w.fp];}});
      // Print I/O input
      if(b.flags?.printio&&inputs.dataset) addLog('print',`📥 ${BD[b.type]?.lbl||b.type} INPUT: ${inputs.dataset.total_rows||inputs.dataset.rows?.length||0} rows`);
      // Map sample_data
      const op = b.type==='sample_data'?'csv_reader':b.type;
      const params2 = {...b.params};if(b.type==='sample_data')params2.filename=b.params.dataset;

      addLog('etl','▶ '+(BD[b.type]?.lbl||b.type));
      const exec = ()=>fetch('/api/etl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operation:op,params:params2,inputs})}).then(r=>r.json());

      let data;
      if(b.flags?.trycatch) {
        try{data=await exec();}catch(e){addLog('exception','🛡 '+b.type+': '+e.message);data={dataset:inputs.dataset||{columns:[],rows:[]}};}
        if(data?.error){addLog('exception','🛡 '+data.error);data={dataset:inputs.dataset||{columns:[],rows:[]}};}
      } else {
        try{data=await exec();}catch(e){addLog('error','✗ '+b.type+': '+e.message);continue;}
        if(data?.error){addLog('error','  ✗ '+data.error);continue;}
      }
      if(data.log) addLog('info','  '+data.log);
      const out={};
      if(data.dataset)out.dataset=data.dataset;
      if(data.train_dataset)out.dataset=data.train_dataset;
      if(data.test_dataset)out.test_dataset=data.test_dataset;
      if(data.model)out.model=data.model;
      if(data.profile)out.profile=data.profile;
      if(data.correlation_matrix)out.matrix=data.correlation_matrix;
      outputs.set(bid,out);
      // Print I/O output
      if(b.flags?.printio&&data.dataset) addLog('print',`📤 OUTPUT: ${data.dataset.total_rows||data.dataset.rows?.length||0} rows`);
      // File logging
      try{fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries:[{ts:new Date().toISOString(),type:'etl',text:b.type+': '+(data.log||'')}]})});}catch(e){}
    }

    // Render viz blocks
    const newCharts = [];
    cs.blocks.filter(b=>BD[b.type]?.isViz&&!b.flags?.bypass).forEach(vb=>{
      let cd=null; cs.wires.forEach(w=>{if(w.tid===vb.id){const up=outputs.get(w.fid);if(up)cd=up[w.fp];}});
      if(!cd) return;
      const vt=BD[vb.type]?.vizType, p=vb.params;
      if(vt==='table'&&cd.columns&&cd.rows){setOutTab('Tables');setTableData(cd);}
      else if((vt==='histogram'||vt==='bar')&&typeof cd==='object'&&!Array.isArray(cd)) newCharts.push({id:vb.id,type:'bar',title:p.title||'Chart',data:cd,color:p.color,orientation:p.orientation});
      else if(vt==='pie'&&typeof cd==='object'&&!Array.isArray(cd)) newCharts.push({id:vb.id,type:'pie',title:p.title||'Chart',data:cd});
      else if(vt==='scatter'&&cd.rows){ const pts=cd.rows.map(r=>({x:parseFloat(r[p.x_col||cd.columns[0]])||0,y:parseFloat(r[p.y_col||cd.columns[1]])||0})); newCharts.push({id:vb.id,type:'scatter',title:p.title||'Scatter',data:pts});}
      else if(vt==='line'&&cd.rows){ const xc=p.x_col||cd.columns[0],yc=p.y_col||cd.columns[1]; newCharts.push({id:vb.id,type:'line',title:p.title||'Line',labels:cd.rows.map(r=>String(r[xc]||'')),data:cd.rows.map(r=>parseFloat(r[yc])||0),yCol:yc});}
      else if(vt==='profile'&&cd.stats){setTableData(t=>({...(t||{}),profile:cd}));setOutTab('Profile');}
      else if(vb.type==='bar_chart'&&cd.columns&&cd.rows){const k=p.x_col||cd.columns[0],v=p.y_col||cd.columns[cd.columns.length-1];const hist=Object.fromEntries(cd.rows.map(r=>[String(r[k]||''),parseFloat(r[v])||0]));newCharts.push({id:vb.id,type:'bar',title:p.title||'Bar Chart',data:hist,orientation:p.orientation});}
    });
    if(newCharts.length){setCharts(c=>[...c,...newCharts]);setOutTab('Charts');}
    // Output blocks
    cs.blocks.filter(b=>BD[b.type]?.cat==='out'&&!b.flags?.bypass).forEach(ob=>{
      cs.wires.forEach(w=>{if(w.tid===ob.id){const up=outputs.get(w.fid);if(!up)return;const d=up[w.fp];if(!d)return;
        if(ob.type==='print_block'||ob.type==='log_block')addLog('answer',JSON.stringify(d,null,2).slice(0,800));
        if(ob.type==='write_csv'&&d.rows){const e2=v=>/[",\n]/.test(String(v||''))?'"'+String(v||'').replace(/"/g,'""')+'"':String(v||'');const csv=[d.columns.join(','),...d.rows.map(r=>d.columns.map(c=>e2(r[c]||'')).join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=ob.params.filename||'output.csv';a.click();}
      }});
    });
  };

  // ── QUANTUM EXECUTION ─────────────────────────────────────────
  const runQuantum = async (code, cs) => {
    const qLines = code.split('\n').filter(l=>{const t=l.trim();return t&&!t.startsWith('-- ')&&CODE_MAP[Object.keys(CODE_MAP).find(k=>t.includes('let')&&t.includes('=measure')||['H(','X(','Y(','Z(','S(','T(','Rx(','Ry(','Rz(','CNOT(','CZ(','SWAP(','Toffoli(','qubits(','measure_all(','measure(','statevector(','grover(','vqe(','shor_factor(','molecule ','print('].some(s=>t.startsWith(s)||t.includes(s)))]});
    const qtCode=qLines.join('\n').trim();
    if(!qtCode) return;
    addLog('info','⚛ Running quantum circuit...');
    try{
      const res=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
      const d=await res.json();
      (d.outputs||[]).forEach(t=>addLog('print',t));
      (d.logs||[]).forEach(l=>{if(l.type!=='print')addLog(l.type||'info',l.text||l.m||'');});
      if(d.error)addLog('error','✗ '+d.error);
      if(d.elapsed_ms)addLog('timing','⏱ Quantum: '+d.elapsed_ms+'ms');
      // Render quantum outputs into chart blocks
      (d.outputs||[]).forEach(out=>{
        try{
          const parsed=JSON.parse(out);
          if(typeof parsed==='object'&&!Array.isArray(parsed)){
            const chartBlocks=cs.blocks.filter(b=>BD[b.type]?.isViz&&['histogram','bar','pie'].includes(BD[b.type]?.vizType)&&!b.flags?.bypass);
            if(chartBlocks.length){
              const newC=[];
              chartBlocks.forEach(vb=>{if(BD[vb.type]?.vizType==='pie')newC.push({id:vb.id+'q',type:'pie',title:vb.params.title||'Results',data:parsed});else newC.push({id:vb.id+'q',type:'bar',title:vb.params.title||'Results',data:parsed,color:vb.params.color});});
              setCharts(c=>[...c,...newC]);setOutTab('Charts');
            }
          }
        }catch(e){}
      });
    }catch(e){addLog('error','Cannot reach server: '+e.message);}
  };

  const runSingleBlock = async (bid) => {
    const cs=getActiveCS(); const b=cs.blocks.find(x=>x.id===bid);if(!b)return;
    const op=b.type==='sample_data'?'csv_reader':b.type;const p={...b.params};if(b.type==='sample_data')p.filename=b.params.dataset;
    addLog('etl','▶ Running: '+(BD[b.type]?.lbl||b.type));
    try{const res=await fetch('/api/etl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operation:op,params:p,inputs:{}})});const d=await res.json();
    if(d.error){addLog('error','✗ '+d.error);return;}if(d.log)addLog('etl',d.log);if(d.dataset){setTableData(d.dataset);setOutTab('Tables');}addLog('success','✓ Done');}catch(e){addLog('error',e.message);}
  };

  // ── THEME ────────────────────────────────────────────────────
  useEffect(()=>{ document.body.className=settings.theme||''; },[settings.theme]);

  // ── EXAMPLES MODAL ────────────────────────────────────────────
  const allExamples = ALL_EXAMPLES;
  const exCats = ['All',...new Set(allExamples.map(e=>e.cat))];
  const filteredEx = exCatFilter&&exCatFilter!=='All' ? allExamples.filter(e=>e.cat===exCatFilter) : allExamples;

  // ── RENDER ────────────────────────────────────────────────────
  const cs = getActiveCS();
  const selectedBlock = cs.selected ? cs.blocks.find(b=>b.id===cs.selected) : null;

  return (
    <div className="app">
      {/* TOOLBAR */}
      <div className="toolbar">
        <span className="logo">⟨ψ⟩ SANSQRIT</span>
        <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginRight:4}}>v3.3 React</span>
        <div className="tb-sep"/>
        <button className="tb-btn primary" onClick={runProgram} disabled={running}>▶ Run</button>
        <button className="tb-btn" style={{color:'var(--purple)'}} onClick={compileBlocks}>🔨 Compile</button>
        <button className="tb-btn danger" onClick={stopProgram} disabled={!running}>■ Stop</button>
        <div className="tb-sep"/>
        <button className="tb-btn" onClick={()=>{ if(confirm('Clear canvas?')) dispatch({type:'CLEAR'}); }}>📄 New</button>
        <button className="tb-btn" onClick={saveCanvas}>💾 Save</button>
        <button className="tb-btn" onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='.sanskrit,.json';i.onchange=e=>loadFile(e.target.files[0]);i.click();}}>📂 Load</button>
        <div className="tb-sep"/>
        <button className="tb-btn" onClick={handleAutoAlign}>⊞ Align</button>
        <button className="tb-btn" onClick={()=>setModal('examples')}>🎯 Examples</button>
        <button className="tb-btn" onClick={()=>setModal('settings')}>⚙ Settings</button>
        <span style={{fontSize:11,color:'var(--text3)'}}>Wire:</span>
        <select className="tb-select" value={settings.wireStyle||'curved'} onChange={e=>setSettings(s=>({...s,wireStyle:e.target.value}))}>
          <option value="curved">〰 Curved</option>
          <option value="straight">━ Straight</option>
          <option value="stepped">⌐ Stepped</option>
        </select>
        <div className="tb-right">
          <select className="tb-select" value={settings.theme||''} onChange={e=>setSettings(s=>({...s,theme:e.target.value}))}>
            <option value="">Dark</option>
            <option value="t-mid">Midnight</option>
            <option value="t-pur">Purple</option>
            <option value="t-for">Forest</option>
            <option value="t-oce">Ocean</option>
            <option value="t-lit">Light</option>
          </select>
          <div className={`status-dot${running?' running':''}`}/>
          <span style={{fontSize:11,color:'var(--text2)'}}>{running?'Running...':'Ready'}</span>
        </div>
      </div>
      {/* METRICS */}
      <div className="metrics-bar">
        <div className="mi"><span>CPU</span><div className="mbar"><div className="mbf" style={{width:Math.min(100,metrics.cpu)+'%'}}/></div><span>{metrics.cpu}%</span></div>
        <div className="mi"><span>HEAP</span><div className="mbar"><div className="mbf" style={{width:Math.min(100,Math.round((metrics.heap_mb||0)/(metrics.heap_total||100)*100))+'%'}}/></div><span>{metrics.heap_mb}/{metrics.heap_total}MB</span></div>
        <span style={{color:'var(--border2)'}}>│</span>
        <span>SYS {metrics.sys_pct||0}%</span>
        <span style={{color:'var(--border2)'}}>│</span>
        <span>UP {metrics.uptime||0}s</span>
        <span style={{color:'var(--border2)'}}>│</span>
        <span style={{color:'#22D3EE'}}>{Object.keys(BD).length+Object.keys(extraBlocks).length} blocks</span>
      </div>
      {/* MAIN AREA: Palette | Tabs+Canvas | Properties */}
      <div className="main-area">
        {/* LEFT PANEL — palette (never moves with canvas) */}
        <Palette onAddBlock={(id)=>{ const b=mkBlock(id,snap(100+cs.blocks.length*30),snap(100+Math.floor(cs.blocks.length/5)*180)); if(b)dispatch({type:'ADD_BLOCK',block:b}); }} extraBlocks={extraBlocks}/>
        {/* CENTER: Tabs + Canvas */}
        <div className="canvas-container">
          {/* Tab bar */}
          <div className="tab-bar">
            {tabs.map(t=>(
              <div key={t.id} className={`tab-item${t.id===activeTabId?' active':''}`} onClick={()=>setActiveTabId(t.id)}>
                <span>{t.title}</span>
                {tabs.length>1 && <button className="tab-close" onClick={e=>{e.stopPropagation();closeTab(t.id);}}>✕</button>}
              </div>
            ))}
            <div className="tab-add" title="New canvas tab" onClick={addTab}>＋</div>
          </div>
          {/* Canvas viewport */}
          <Canvas cs={cs} dispatch={dispatch} running={running} wireStyle={settings.wireStyle||'curved'}/>
        </div>
        {/* RIGHT PANEL — properties (never moves with canvas) */}
        <Properties block={selectedBlock}
          onUpdateParam={(k,v)=>{
            if(!cs.selected) return;
            dispatch({type:'UPDATE_PARAM',bid:cs.selected,k,v});
          }}
          onUpdateFlag={(bid,k,v)=>dispatch({type:'UPDATE_FLAG',bid,k,v})}
          onRunBlock={runSingleBlock}/>
      </div>
      {/* BOTTOM: Output Console */}
      <OutputConsole logs={logs} charts={charts} tableData={tableData} dslCode={dslCode}
        activeTab={outTab} setActiveTab={setOutTab}
        onClear={()=>{setLogs([]);clearOutput();}}
        onDlTable={()=>{
          if(!tableData)return;
          const e2=v=>/[",\n]/.test(String(v||''))?'"'+String(v||'').replace(/"/g,'""')+'"':String(v||'');
          const csv=[tableData.columns.join(','),...tableData.rows.map(r=>tableData.columns.map(c=>e2(r[c]||'')).join(','))].join('\n');
          const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='export.csv';a.click();
        }}/>
      {/* EXAMPLES MODAL */}
      {modal==='examples' && (
        <div className="modal-ov" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{width:920,maxWidth:'96vw'}}>
            <div className="mh"><span className="mt">🎯 Visual Block Examples ({allExamples.length})</span><button className="mc" onClick={()=>setModal(null)}>✕</button></div>
            <div className="mbod">
              <div className="exf">
                {exCats.map(c=><div key={c} className={`exp${(exCatFilter===c||(c==='All'&&!exCatFilter))?' active':''}`} onClick={()=>setExCatFilter(c==='All'?'':c)}>{c}</div>)}
              </div>
              <div className="exg">
                {filteredEx.map(ex=>(
                  <div key={ex.id} className="exc" onClick={()=>loadExample(ex)}>
                    <div className="exct">{ex.cat}</div>
                    <div className="extit">{ex.title}</div>
                    <div className="exd">{ex.desc}</div>
                    <div><span className={`exdiff d${ex.diff||'B'}`}>{{B:'Beginner',I:'Intermediate',A:'Advanced'}[ex.diff||'B']}</span><span style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>⬡ {(ex.blocks||[]).length} blocks</span></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
      {/* SETTINGS MODAL */}
      {modal==='settings' && (
        <div className="modal-ov" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{width:760,maxWidth:'96vw'}}>
            <div className="mh"><span className="mt">⚙ Settings</span><button className="mc" onClick={()=>setModal(null)}>✕</button></div>
            <div className="mbod">
              <div className="sg">
                <div className="sc"><div className="sct">Appearance</div>
                  <div className="sr"><span className="sl">Theme</span><select className="ssel" value={settings.theme||''} onChange={e=>setSettings(s=>({...s,theme:e.target.value}))}>
                    {[['','Dark'],['t-mid','Midnight'],['t-pur','Purple'],['t-for','Forest'],['t-oce','Ocean'],['t-lit','Light']].map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
                  <div className="sr"><span className="sl">Wire style</span><select className="ssel" value={settings.wireStyle||'curved'} onChange={e=>setSettings(s=>({...s,wireStyle:e.target.value}))}>
                    <option value="curved">〰 Curved</option><option value="straight">━ Straight</option><option value="stepped">⌐ Stepped</option></select></div>
                </div>
                <div className="sc"><div className="sct">Canvas</div>
                  <div className="sr"><span className="sl">Snap to Grid</span><div className={`tgl${settings.snapToGrid?' on':''}`} onClick={()=>setSettings(s=>({...s,snapToGrid:!s.snapToGrid}))}/></div>
                  <div className="sr"><span className="sl">Auto-save (local)</span><div className={`tgl${settings.autoSave?' on':''}`} onClick={()=>setSettings(s=>({...s,autoSave:!s.autoSave}))}/></div>
                </div>
                <div className="sc"><div className="sct">Data</div>
                  <div className="sr"><span className="sl">Table page size</span><input type="number" className="si" value={settings.tablePageSize||25} min={5} max={500} onChange={e=>setSettings(s=>({...s,tablePageSize:+e.target.value}))}/></div>
                </div>
                <div className="sc"><div className="sct">Keyboard Shortcuts</div>
                  {[['Run','Ctrl+Enter'],['Compile','Ctrl+Shift+B'],['Auto-align','Ctrl+Shift+A'],['Save','Ctrl+S'],['Delete','DEL'],['Deselect','ESC']].map(([a,k])=><div key={a} className="sr"><span className="sl">{a}</span><code style={{fontSize:10,background:'var(--bg4)',padding:'2px 6px',borderRadius:4,fontFamily:'var(--mono)'}}>{k}</code></div>)}
                </div>
                <div className="sc"><div className="sct">About</div>
                  <div style={{fontSize:10,color:'var(--text3)',lineHeight:2}}>Sanskrit Visual Builder v3.3<br/>React 18 + pure Node.js server<br/>528 Quantum + 35 ETL + 8 DS blocks<br/>No npm install required<br/>Multiple canvas tabs supported</div>
                  <div style={{marginTop:8}}><button style={{width:'100%',padding:5,borderRadius:5,background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--red)',cursor:'pointer'}} onClick={()=>{setLogs([]);clearOutput();setModal(null);}}>🗑 Clear Output</button></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// MOUNT
// ══════════════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
