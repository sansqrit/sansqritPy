function canvasToJSON(){
  return{version:'3.2',title:'Sanskrit Canvas',created:new Date().toISOString(),
    blocks:[...ST.blocks.values()].map(b=>({id:b.id,type:b.type,x:b.x,y:b.y,params:{...b.params}})),
    wires:[...ST.wires.values()].map(w=>({fromId:w.fromId,fromPort:w.fromPort,toId:w.toId,toPort:w.toPort}))};
}

function loadFromJSON(data){
  clearCanvas();
  const idMap={};
  (data.blocks||[]).forEach(bd=>{
    const def=BD[bd.type||bd.defId];if(!def)return;
    const b=addBlock(bd.type||bd.defId,bd.x||100,bd.y||100,bd.id);
    if(b&&bd.params){Object.assign(b.params,bd.params);updateBlockDisplay(b);}
    if(b)idMap[bd.id]=b.id;
  });
  setTimeout(()=>{
    (data.wires||[]).forEach(w=>{
      const fi=idMap[w.fromId]||w.fromId,ti=idMap[w.toId]||w.toId;
      if(fi&&ti)addWire(fi,w.fromPort||'out',ti,w.toPort||'in');
    });
    fitView();
  },100);
  addLog('info','Loaded: '+(data.title||'Canvas')+' ('+( (data.blocks||[]).length)+' blocks)');
}

function clearCanvas(){
  ST.blocks.forEach(b=>b.el.remove());ST.blocks.clear();
  ST.wires.forEach(w=>w.el&&w.el.remove());ST.wires.clear();
  ST.selected=null;ST.selWire=null;showPropsEmpty();updateHint();
}
function updateHint(){$('canvas-hint').style.display=ST.blocks.size?'none':'';}

function saveCanvas(){
  const json=canvasToJSON();
  const blob=new Blob([JSON.stringify(json,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='canvas.sanskrit';a.click();URL.revokeObjectURL(a.href);
  localStorage.setItem('sk-canvas',JSON.stringify(json));

  ST.running=v;
  const dot=$('status-dot'),txt=$('status-text'),br=$('btn-run'),bs=$('btn-stop');
  if(v){dot.className='running';txt.textContent='Running...';if(br){br.disabled=true;br.textContent='⟨ψ⟩ Running...';}if(bs)bs.disabled=false;}
  else{dot.className='';txt.textContent='Ready';if(br){br.disabled=false;br.innerHTML='▶ Run';}if(bs)bs.disabled=true;}
}

function fitView(){
  if(!ST.blocks.size){ST.vs=1;ST.vx=60;ST.vy=60;applyVP();return;}
  let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
  ST.blocks.forEach(b=>{mx=Math.min(mx,b.x);my=Math.min(my,b.y);Mx=Math.max(Mx,b.x+220);My=Math.max(My,b.y+150);});
  const ca=$('canvas-area').getBoundingClientRect(),pad=60;
  ST.vs=Math.min(1.2,Math.min((ca.width-pad*2)/(Mx-mx||1),(ca.height-pad*2)/(My-my||1)));
  ST.vx=-mx*ST.vs+pad;ST.vy=-my*ST.vs+pad;applyVP();
}

// ═══════════════════════════════════════════════════════════════════
// METRICS
// ═══════════════════════════════════════════════════════════════════
function updateMetrics(m){
  const sV=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  const sB=(id,p,hot,warm)=>{const e=$(id);if(!e)return;e.style.width=Math.min(100,Math.max(0,p))+'%';e.className='mbar-fill '+(p>hot?'hot':p>warm?'warm':'normal');};
  if(m.cpu!==undefined){sB('cpu-bar',m.cpu,80,60);sV('cpu-val',m.cpu+'%');}
  if(m.heap_mb!==undefined&&m.heap_total){sB('mem-bar',Math.round(m.heap_mb/m.heap_total*100),85,65);sV('mem-val',m.heap_mb+'/'+m.heap_total+'MB');}
  if(m.sys_pct!==undefined)sV('sys-val','SYS '+m.sys_pct+'%');
  if(m.uptime!==undefined){const u=m.uptime;sV('uptime-val','UP '+Math.floor(u/3600)+'h'+Math.floor(u%3600/60)+'m'+u%60+'s');}
  if(m.blocks!==undefined)sV('blk-val',m.blocks+' blocks');
}
function connectSSE(){
  const sse=new EventSource('/api/events');
  const sv=$('sse-val');
  sse.onopen=()=>{if(sv){sv.textContent='⚡ Live';sv.style.color='var(--green)';}};
  sse.addEventListener('metrics',e=>{try{updateMetrics(JSON.parse(e.data));}catch(ex){}});
  sse.addEventListener('run_line',e=>{try{const d=JSON.parse(e.data);addLog(d.type||'print',d.text||'');}catch(ex){}});
  sse.onerror=()=>{if(sv){sv.textContent='⚡ offline';sv.style.color='var(--text3)';}};
}
connectSSE();
setInterval(async()=>{try{const r=await fetch('/api/metrics');updateMetrics(await r.json());}catch(e){}},5000);

// ═══════════════════════════════════════════════════════════════════
// VIDEO RECORDING
// ═══════════════════════════════════════════════════════════════════
let _rec=null,_chunks=[];
$('btn-rec').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30}});
    _rec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9'});_chunks=[];
    _rec.ondataavailable=e=>{if(e.data.size>0)_chunks.push(e.data);};
    _rec.onstop=()=>{
      const blob=new Blob(_chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);
      const vid=ce('video');vid.src=url;vid.controls=true;vid.style='width:100%;border-radius:6px';
      $('video-preview').innerHTML='';$('video-preview').appendChild(vid);
      $('btn-rec-dl').disabled=false;$('btn-rec-dl').onclick=()=>{const a=ce('a');a.href=url;a.download='session.webm';a.click();};
    };
    _rec.start();$('btn-rec').disabled=true;$('btn-rec-stop').disabled=false;
    addLog('info','⏺ Recording — select this window in the dialog');
  }catch(e){addLog('error','Recording unavailable: '+e.message);}
});
$('btn-rec-stop').addEventListener('click',()=>{if(_rec&&_rec.state!=='inactive'){_rec.stop();_rec.stream.getTracks().forEach(t=>t.stop());}$('btn-rec').disabled=false;$('btn-rec-stop').disabled=true;});

// TOOLBAR BINDINGS

$('btn-run').addEventListener('click',runProgram);

$('btn-fit2').addEventListener('click',fitView);
$('btn-zi').addEventListener('click',()=>{ST.vs=Math.min(2.5,ST.vs*1.2);applyVP();});
$('btn-zo').addEventListener('click',()=>{ST.vs=Math.max(0.15,ST.vs*0.8);applyVP();});
$('btn-zr').addEventListener('click',()=>{ST.vs=1;ST.vx=60;ST.vy=60;applyVP();});
$('theme-sel').addEventListener('change',e=>{applyTheme(e.target.value);saveSettings({theme:e.target.value});});
$('file-load').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{loadFromJSON(JSON.parse(ev.target.result));}catch(ex){addLog('error','Load failed: '+ex.message);}};
  r.readAsText(f);e.target.value='';
});
$('modal-overlay').addEventListener('click',e=>{if(e.target===$('modal-overlay'))closeModal();});
